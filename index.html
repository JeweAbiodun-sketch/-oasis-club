<style>
:root{
  --teal:#0F6E56;--teal-dark:#085041;--teal-light:#E1F5EE;
  --gold:#B8860B;--gold-light:#FAEEDA;
  --cream:#FBF8F2;--paper:#FFFFFF;
  --ink:#2C2C2A;--ink-soft:#5F5E5A;--ink-faint:#888780;
  --line:#E5E1D6;--line-soft:#EFEBE0;
  --red:#A32D2D;--red-light:#FCEBEB;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
h1,h2,h3{font-family:'Source Serif 4',Georgia,serif;font-weight:600;color:var(--teal-dark);}

/* layout */
#shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
#nav{background:var(--teal-dark);padding:28px 16px;display:flex;flex-direction:column;gap:4px;}
#main{padding:32px 40px;max-width:1100px;}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px;padding:0 8px;}
.brand-mark{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.15);}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-text{color:#fff;}
.brand-text .name{font-family:'Source Serif 4',serif;font-size:15px;font-weight:600;line-height:1.2;}
.brand-text .place{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.04em;text-transform:uppercase;}

.navlink{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13.5px;font-weight:500;transition:background .15s,color .15s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.navlink:hover{background:rgba(255,255,255,.06);color:#fff;}
.navlink.active{background:rgba(255,255,255,.12);color:#fff;}
.navlink svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav-divider{height:1px;background:rgba(255,255,255,.1);margin:14px 8px;}
.nav-foot{margin-top:auto;padding:0 8px;color:rgba(255,255,255,.35);font-size:11px;line-height:1.6;}

/* page header */
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;}
.page-head h1{font-size:26px;letter-spacing:-.01em;}
.page-head .sub{color:var(--ink-soft);font-size:13px;margin-top:4px;}

/* cards */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px 22px;}
.card + .card{margin-top:16px;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-head h2{font-size:16px;}
.card-head .meta{font-size:12px;color:var(--ink-faint);}

/* stat row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px 18px;}
.stat .label{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.stat .value{font-size:26px;font-weight:600;font-family:'Source Serif 4',serif;color:var(--ink);}
.stat .value.teal{color:var(--teal);}
.stat .value.gold{color:var(--gold);}
.stat .value.red{color:var(--red);}
.stat .note{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:13px;font-weight:500;color:var(--ink);font-family:inherit;transition:all .15s;}
.btn:hover{border-color:var(--ink-faint);background:var(--cream);}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-primary:hover{background:var(--teal-dark);border-color:var(--teal-dark);}
.btn-danger{color:var(--red);border-color:var(--red-light);}
.btn-danger:hover{background:var(--red-light);}
.btn-sm{padding:5px 11px;font-size:12.5px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn svg{width:15px;height:15px;}

/* forms */
label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],select,textarea{
  width:100%;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 11px;
  font-size:13.5px;color:var(--ink);font-family:inherit;outline:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--teal);}
textarea{resize:vertical;min-height:90px;}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;font-weight:600;padding:8px 10px;border-bottom:1.5px solid var(--line);}
td{padding:11px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--cream);}
.cell-name{font-weight:500;}
.cell-muted{color:var(--ink-faint);font-size:12px;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:20px;}
.badge-paid{background:var(--teal-light);color:var(--teal-dark);}
.badge-due{background:var(--gold-light);color:#7a5800;}
.badge-overdue{background:var(--red-light);color:var(--red);}
.badge-active{background:var(--teal-light);color:var(--teal-dark);}
.badge-inactive{background:var(--line-soft);color:var(--ink-faint);}
.badge-suspended{background:var(--gold-light);color:#7a5800;}
.badge-dismissed{background:var(--red-light);color:var(--red);}

/* empty state */
.empty{text-align:center;padding:48px 20px;color:var(--ink-faint);}
.empty svg{width:40px;height:40px;opacity:.3;margin-bottom:12px;}
.empty .title{font-size:14px;color:var(--ink-soft);font-weight:500;margin-bottom:4px;}
.empty .hint{font-size:12.5px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--paper);border-radius:var(--radius-lg);padding:26px 28px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;}
.modal h3{font-size:18px;margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* dues grid */
.dues-grid{overflow-x:auto;}
.dues-grid table{min-width:760px;}
.dues-cell{width:36px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:600;border:1px solid transparent;}
.dues-cell.paid{background:var(--teal-light);color:var(--teal-dark);}
.dues-cell.unpaid{background:var(--line-soft);color:var(--ink-faint);}
.dues-cell.unpaid:hover{border-color:var(--ink-faint);}
.dues-cell.paid:hover{border-color:var(--teal);}

/* toggle pill */
.seg{display:inline-flex;background:var(--line-soft);border-radius:8px;padding:3px;gap:2px;}
.seg button{border:none;background:transparent;padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
.seg button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--ink-faint);padding:5px;border-radius:6px;display:inline-flex;}
.icon-btn:hover{background:var(--cream);color:var(--ink);}
.icon-btn svg{width:16px;height:16px;}

#load-overlay{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:10px;}
#load-overlay .ring{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
#pin-gate{position:fixed;inset:0;background:var(--cream);display:none;align-items:center;justify-content:center;z-index:900;padding:20px;}
#pin-gate.show{display:flex;}
.pin-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:32px 30px;max-width:340px;width:100%;text-align:center;}
.pin-card .pin-logo{width:64px;height:64px;border-radius:14px;overflow:hidden;margin:0 auto 16px;}
.pin-card .pin-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.pin-card h2{font-size:18px;margin-bottom:4px;}
.pin-card .pin-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;}
#pin-select{margin-bottom:14px;}
#pin-input{text-align:center;font-size:20px;letter-spacing:6px;font-family:'Inter',sans-serif;}
#pin-error{font-size:12.5px;color:var(--red);margin-top:10px;min-height:16px;}
.pin-btn-row{margin-top:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

@media(max-width:820px){
  #shell{grid-template-columns:1fr;}
  #nav{display:none;}
  #main{padding:20px;}
  .stats{grid-template-columns:1fr 1fr;}
  .field-row,.field-row3{grid-template-columns:1fr;}
}
</style>
</head>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadData(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw)DATA=JSON.parse(raw);
  }catch(e){ /* first run, no data yet */ }
  if(!DATA.members)DATA.members=[];
  if(!DATA.minutes)DATA.minutes=[];
  if(!DATA.transactions)DATA.transactions=[];
  if(!DATA.meta)DATA.meta={financialYearStart:'2025-10-01',quorumNote:'',nextAgmDate:'2026-12-26'};
  if(!DATA.meta.nextAgmDate)DATA.meta.nextAgmDate='2026-12-26';
}
async function saveData(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify(DATA));
  }catch(e){console.error('save failed',e);showToast('Could not save \u2014 storage may be full');}
}
function exportBackup(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='oasis-club-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}
function importBackup(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.members)throw new Error('not a valid backup file');
      DATA=parsed;
      await saveData();render();showToast('Backup restored');
    }catch(err){alert('Could not read this file as a valid Oasis Club backup.');}
  };
  reader.readAsText(file);
}

function navigate(page){
  currentPage=page;

}
document.querySelectorAll('.navlink').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.page)));

/* ============ OVERVIEW ============ */
function pageOverview(){
  const total=DATA.members.length;
  const active=DATA.members.filter(isActiveMember).length;
  const expected=Number(DATA.meta.annualDueAmount||50000);
  const paidThisMonth=DATA.members.filter(m=>Number(m.duesPaid||0)>=expected).length;
  const overdue=active-paidThisMonth;
  const balance=DATA.transactions.reduce((s,t)=>s+(t.type==='income'?Number(t.amount):-Number(t.amount)),0);
  const officerCount=7;
  const nextMeeting=upcomingMeetingDate();
  const recentMinutes=[...DATA.minutes].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  const agmWarning=getAgmWarning(DATA.meta.nextAgmDate);

  return `
  <div class="page-head">
    <div><h1>Overview</h1><div class="sub">Club snapshot &middot; ${todayLong()}</div></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="label">Members</div><div class="value">${total}<span style="font-size:14px;color:var(--ink-faint);font-weight:400;"> / 25</span></div><div class="note">${active} active</div></div>
    <div class="stat"><div class="label">Paid this year</div><div class="value teal">${paidThisMonth}</div><div class="note">of ${active} active members</div></div>
    <div class="stat"><div class="label">In arrears</div><div class="value ${overdue>0?'red':''}">${overdue}</div><div class="note">${overdue>0?'needs follow-up':'all clear'}</div></div>
    <div class="stat"><div class="label">Account balance</div><div class="value gold">${fmtMoney(balance)}</div><div class="note">running total to date</div></div>
  </div>

  <div class="card">
    <div class="card-head"><h2>Meeting rhythm</h2><span class="meta">Per Article 10</span></div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;">
      <div><div class="cell-muted">Monthly meeting</div><div style="font-weight:500;margin-top:2px;">Last Sunday of every month</div></div>
      <div><div class="cell-muted">Next Annual General Meeting</div><div style="margin-top:4px;">
        <input type="date" id="agm-date" value="${DATA.meta.nextAgmDate||''}" style="max-width:170px;font-size:13px;padding:6px 8px;" onchange="updateAgmDate(this.value)"/>
      </div></div>
      <div><div class="cell-muted">Quorum (General Meeting)</div><div style="font-weight:500;margin-top:2px;">${Math.ceil(active*2/3)} of ${active} members (2/3)</div></div>
      <div><div class="cell-muted">Quorum (Committee)</div><div style="font-weight:500;margin-top:2px;">${Math.floor(officerCount/2)+1} of ${officerCount} officers</div></div>
    </div>
    ${agmWarning?`<p class="cell-muted" style="color:var(--red);margin-top:10px;">${agmWarning}</p>`:''}
  </div>

  <div class="card">
    <div class="card-head"><h2>Recent minutes</h2><span class="meta" style="cursor:pointer;" onclick="navigate('minutes')">View all &rarr;</span></div>
    ${recentMinutes.length?`<table><tbody>${recentMinutes.map(m=>`
      <tr><td class="cell-name">${escHtml(m.title)}</td><td class="cell-muted">${fmtDate(m.date)}</td><td><span class="badge ${daysSince(m.date)>21?'badge-overdue':'badge-paid'}">${daysSince(m.date)>21?'publish overdue':'within 21 days'}</span></td></tr>
    `).join('')}</tbody></table>`:emptyState('No minutes recorded yet','Add your first meeting minutes from the Minutes page.')}
  </div>`;
}

function currentMonthKey(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth()+1;
  return y+'-'+String(m).padStart(2,'0');
}
function todayLong(){return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function daysSince(d){return Math.floor((Date.now()-new Date(d+'T00:00:00').getTime())/86400000);}
function upcomingMeetingDate(){
  const now=new Date();
  let d=new Date(now.getFullYear(),now.getMonth()+1,0);
  while(d.getDay()!==0)d.setDate(d.getDate()-1);
  if(d<now){d=new Date(now.getFullYear(),now.getMonth()+2,0);while(d.getDay()!==0)d.setDate(d.getDate()-1);}
  return d;
}
function getAgmWarning(dateStr){
  if(!dateStr)return'No date set yet \u2014 the AGM date must be decided before November of this club year (Article 10).';
  const d=new Date(dateStr+'T00:00:00');
  if(d.getMonth()>=10){ // 10 = November (0-indexed)
    return'Heads up: this date falls in November or later. Per club rule, the AGM date should be decided/held before November each year.';
  }
  return'';
}
async function updateAgmDate(val){
  DATA.meta.nextAgmDate=val;await saveData();render();showToast('Next AGM date updated');
}
function emptyState(title,hint){
  return `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8 15c1 1 2.5 1.5 4 1.5s3-.5 4-1.5"/></svg><div class="title">${title}</div><div class="hint">${hint}</div></div>`;
}

function genUniquePin(){
  const used=new Set(DATA.members.map(m=>m.pin).filter(Boolean));
  let p;
  do{p=String(Math.floor(1000+Math.random()*9000));}while(used.has(p));
  return p;
}

/* ============ PIN GATE ============ */
const EDITOR_PINS={
  secretary:'4821',
  treasurer:'7395',
  financial_secretary:'1064'
};
const SESSION_KEY='oasis-club-session-v1';

function populatePinSelect(){
  const sel=document.getElementById('pin-role');
  if(!sel)return;
  const prev=sel.value;
  sel.innerHTML='<option value="">Select your name&hellip;</option>';
  const officerGroup=document.createElement('optgroup');
  officerGroup.label='Officer access (legacy PIN)';
  Object.keys(EDITOR_PINS).forEach(role=>{
    const opt=document.createElement('option');
    opt.value='role:'+role;
    opt.textContent=role.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase());
    officerGroup.appendChild(opt);
  });
  sel.appendChild(officerGroup);
  const memberGroup=document.createElement('optgroup');
  memberGroup.label='Members';
  DATA.members.filter(m=>m.status!=='dismissed').forEach(m=>{
    const opt=document.createElement('option');
    opt.value='member:'+m.id;
    const blocked=m.status==='suspended';
    opt.textContent=m.name+(blocked?' (suspended)':'');
    memberGroup.appendChild(opt);
  });
  sel.appendChild(memberGroup);
  if(prev)sel.value=prev;
}

function checkPin(){
  const value=document.getElementById('pin-role').value;
  const pin=document.getElementById('pin-input').value.trim();
  const errEl=document.getElementById('pin-error');
  if(!value){errEl.textContent='Please select your name first';return;}
  if(!pin){errEl.textContent='Enter your PIN';return;}

  if(value.startsWith('role:')){
    const role=value.slice(5);
    if(EDITOR_PINS[role]===pin){
      sessionStorage.setItem(SESSION_KEY,value);
      document.getElementById('pin-gate').classList.remove('show');
      errEl.textContent='';
      showToast('Welcome, '+role.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase()));
    }else{
      errEl.textContent='Incorrect PIN. Please try again.';
      document.getElementById('pin-input').value='';document.getElementById('pin-input').focus();
    }
    return;
  }

  const memberId=value.slice(7);
  const member=DATA.members.find(m=>m.id===memberId);
  if(!member){errEl.textContent='Member not found.';return;}
  if(member.status==='suspended'||member.status==='dismissed'){
    errEl.textContent='Access has been suspended for this member. Contact a club officer.';
    return;
  }
  if(member.pin===pin){
    sessionStorage.setItem(SESSION_KEY,value);
    document.getElementById('pin-gate').classList.remove('show');
    errEl.textContent='';
    showToast('Welcome, '+member.name);
  }else{
    errEl.textContent='Incorrect PIN. Please try again.';
    document.getElementById('pin-input').value='';document.getElementById('pin-input').focus();
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  const pinInput=document.getElementById('pin-input');
  if(pinInput)pinInput.addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});
});
function checkSession(){
  const value=sessionStorage.getItem(SESSION_KEY);
  if(!value)return null;
  if(value.startsWith('role:')){
    const role=value.slice(5);
    return EDITOR_PINS[role]?value:null;
  }
  const memberId=value.slice(7);
  const member=DATA.members.find(m=>m.id===memberId);
  if(!member)return null;
  if(member.status==='suspended'||member.status==='dismissed')return null; // access auto-revoked
  return value;
}
function lockApp(){
  sessionStorage.removeItem(SESSION_KEY);
  populatePinSelect();
  document.getElementById('pin-gate').classList.add('show');
  document.getElementById('pin-input').value='';
  document.getElementById('pin-role').value='';
}

/* ============ RENDER ============ */
function render(){
  const main=document.getElementById('main');
  if(currentPage==='overview')main.innerHTML=pageOverview();
  else if(currentPage==='members')main.innerHTML=pageMembers();
  else if(currentPage==='dues')main.innerHTML=pageDues();
  else if(currentPage==='minutes')main.innerHTML=pageMinutes();
  else if(currentPage==='finance')main.innerHTML=pageFinance();
  else if(currentPage==='committee')main.innerHTML=pageCommittee();
}

(async function init(){
  await loadData();
  populatePinSelect();
  document.getElementById('load-overlay').style.display='none';
  document.getElementById('shell').style.display='grid';
  if(!checkSession()){
    document.getElementById('pin-gate').classList.add('show');
  }
  render();
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}
</script>
