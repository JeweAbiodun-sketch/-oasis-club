<style>
:root{
  --teal:#0F6E56;--teal-dark:#085041;--teal-light:#E1F5EE;
  --gold:#B8860B;--gold-light:#FAEEDA;
  --cream:#FBF8F2;--paper:#FFFFFF;
  --ink:#2C2C2A;--ink-soft:#5F5E5A;--ink-faint:#888780;
  --line:#E5E1D6;--line-soft:#EFEBE0;
  --red:#A32D2D;--red-light:#FCEBEB;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
h1,h2,h3{font-family:'Source Serif 4',Georgia,serif;font-weight:600;color:var(--teal-dark);}

/* layout */
#shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
#nav{background:var(--teal-dark);padding:28px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto;}
#main{padding:32px 40px;max-width:1100px;}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:32px;padding:0 8px;}
.brand-mark{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.15);}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-text{color:#fff;}
.brand-text .name{font-family:'Source Serif 4',serif;font-size:15px;font-weight:600;line-height:1.2;}
.brand-text .place{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.04em;text-transform:uppercase;}

.navlink{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13.5px;font-weight:500;transition:background .15s,color .15s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.navlink:hover{background:rgba(255,255,255,.06);color:#fff;}
.navlink.active{background:rgba(255,255,255,.12);color:#fff;}
.navlink svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
.nav-divider{height:1px;background:rgba(255,255,255,.1);margin:14px 8px;}
.nav-foot{margin-top:auto;padding:0 8px;color:rgba(255,255,255,.35);font-size:11px;line-height:1.6;}

/* page header */
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;}
.page-head h1{font-size:26px;letter-spacing:-.01em;}
.page-head .sub{color:var(--ink-soft);font-size:13px;margin-top:4px;}

/* cards */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px 22px;}
.card + .card{margin-top:16px;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-head h2{font-size:16px;}
.card-head .meta{font-size:12px;color:var(--ink-faint);}

/* stat row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px 18px;}
.stat .label{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.stat .value{font-size:26px;font-weight:600;font-family:'Source Serif 4',serif;color:var(--ink);}
.stat .value.teal{color:var(--teal);}
.stat .value.gold{color:var(--gold);}
.stat .value.red{color:var(--red);}
.stat .note{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-size:13px;font-weight:500;color:var(--ink);font-family:inherit;transition:all .15s;}
.btn:hover{border-color:var(--ink-faint);background:var(--cream);}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-primary:hover{background:var(--teal-dark);border-color:var(--teal-dark);}
.btn-danger{color:var(--red);border-color:var(--red-light);}
.btn-danger:hover{background:var(--red-light);}
.btn-sm{padding:5px 11px;font-size:12.5px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn svg{width:15px;height:15px;}

/* forms */
label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],select,textarea{
  width:100%;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 11px;
  font-size:13.5px;color:var(--ink);font-family:inherit;outline:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--teal);}
textarea{resize:vertical;min-height:90px;}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.03em;font-weight:600;padding:8px 10px;border-bottom:1.5px solid var(--line);}
td{padding:11px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--cream);}
.cell-name{font-weight:500;}
.cell-muted{color:var(--ink-faint);font-size:12px;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:20px;}
.badge-paid{background:var(--teal-light);color:var(--teal-dark);}
.badge-due{background:var(--gold-light);color:#7a5800;}
.badge-overdue{background:var(--red-light);color:var(--red);}
.badge-active{background:var(--teal-light);color:var(--teal-dark);}
.badge-inactive{background:var(--line-soft);color:var(--ink-faint);}
.badge-suspended{background:var(--gold-light);color:#7a5800;}
.badge-dismissed{background:var(--red-light);color:var(--red);}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;min-width:18px;text-align:center;}

.avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--teal-light);display:inline-block;vertical-align:middle;}
.avatar-placeholder{width:34px;height:34px;border-radius:50%;background:var(--teal-light);color:var(--teal-dark);display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;vertical-align:middle;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;}
.photo-card{text-align:center;}
.photo-card .avatar-large,.photo-card .avatar-placeholder-large{width:100%;aspect-ratio:1/1;border-radius:12px;object-fit:cover;display:block;}
.photo-card .avatar-placeholder-large{background:var(--teal-light);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;}
.photo-card .pc-name{margin-top:8px;font-size:13px;font-weight:500;color:var(--ink);}
.photo-card .pc-role{font-size:11.5px;color:var(--ink-faint);}
.photo-upload-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.photo-upload-row .avatar-large{width:64px;height:64px;border-radius:50%;object-fit:cover;}
.photo-upload-row .avatar-placeholder-large{width:64px;height:64px;border-radius:50%;aspect-ratio:unset;font-size:22px;}

/* empty state */
.empty{text-align:center;padding:48px 20px;color:var(--ink-faint);}
.empty svg{width:40px;height:40px;opacity:.3;margin-bottom:12px;}
.empty .title{font-size:14px;color:var(--ink-soft);font-weight:500;margin-bottom:4px;}
.empty .hint{font-size:12.5px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--paper);border-radius:var(--radius-lg);padding:26px 28px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;}
.modal h3{font-size:18px;margin-bottom:18px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* News & Notices: rich text composer */
.rte-toolbar{display:flex;align-items:center;gap:4px;padding:6px;border:1px solid var(--line-soft);border-bottom:none;border-radius:8px 8px 0 0;background:#FAF7F0;}
.rte-toolbar button{width:30px;height:28px;border:1px solid transparent;background:transparent;border-radius:5px;cursor:pointer;font-size:12.5px;color:var(--ink);}
.rte-toolbar button:hover{background:#fff;border-color:var(--line-soft);}
.rte-sep{width:1px;height:20px;background:var(--line-soft);margin:0 4px;}
.rte-color-label{display:flex;align-items:center;justify-content:center;width:30px;height:28px;border-radius:5px;cursor:pointer;font-size:12.5px;font-weight:600;position:relative;}
.rte-color-label:hover{background:#fff;}
.rte-color-label input[type="color"]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.rte-editor{min-height:140px;max-height:320px;overflow-y:auto;border:1px solid var(--line-soft);border-radius:0 0 8px 8px;padding:10px 12px;font-size:13.5px;line-height:1.55;outline:none;}
.rte-editor:empty:before{content:attr(data-placeholder);color:var(--ink-faint);}
.rte-editor ul,.rte-editor ol{margin:6px 0 6px 20px;}
.news-body ul,.news-body ol{margin:6px 0 6px 20px;}
.news-attachment-chip{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 12px;border:1px solid var(--line-soft);border-radius:8px;font-size:12.5px;color:var(--teal-dark);text-decoration:none;background:#FAF7F0;}
.news-attachment-chip:hover{background:#fff;}

/* Task board */
.task-board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start;}
@media (max-width:860px){.task-board{grid-template-columns:1fr;}}
.task-column{background:#FAF7F0;border:1px solid var(--line-soft);border-radius:12px;padding:12px;min-height:80px;}
.task-column-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--teal-dark);margin-bottom:10px;padding:0 2px;}
.task-column-count{background:var(--line-soft);color:var(--ink-faint);font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;}
.task-column-empty{font-size:12.5px;color:var(--ink-faint);text-align:center;padding:18px 0;}
.task-card{background:#fff;border:1px solid var(--line-soft);border-radius:10px;padding:12px;margin-bottom:10px;}
.task-card-cat{display:inline-block;font-size:10.5px;font-weight:600;letter-spacing:0.5px;color:var(--teal-dark);background:var(--teal-light);padding:2px 8px;border-radius:20px;margin-bottom:7px;}
.task-card-title{font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;line-height:1.4;}
.task-card-title:hover{color:var(--teal-dark);}
.task-card-notes{font-size:12px;color:var(--ink-faint);margin-top:5px;line-height:1.45;}
.task-card-footer{margin-top:8px;}
.task-card-assignee{font-size:11.5px;color:var(--ink-faint);}
.task-card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.task-move-btn{font-size:11px;font-weight:500;padding:5px 9px;border-radius:6px;border:1px solid var(--line-soft);background:#FAF7F0;color:var(--ink);cursor:pointer;}
.task-move-btn:hover{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark);}
.welfare-member-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line-soft);}
.welfare-member-row:last-child{border-bottom:none;}

/* dues grid */
.dues-grid{overflow-x:auto;}
.dues-grid table{min-width:760px;}
.dues-cell{width:36px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:600;border:1px solid transparent;}
.dues-cell.paid{background:var(--teal-light);color:var(--teal-dark);}
.dues-cell.unpaid{background:var(--line-soft);color:var(--ink-faint);}
.dues-cell.unpaid:hover{border-color:var(--ink-faint);}
.dues-cell.paid:hover{border-color:var(--teal);}

/* toggle pill */
.seg{display:inline-flex;background:var(--line-soft);border-radius:8px;padding:3px;gap:2px;}
.seg button{border:none;background:transparent;padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
.seg button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

#update-banner{position:fixed;top:0;left:0;right:0;background:var(--teal-dark);color:#fff;padding:10px 16px;display:none;align-items:center;justify-content:center;gap:14px;font-size:13.5px;font-weight:500;z-index:500;box-shadow:0 2px 10px rgba(0,0,0,.15);}
#update-banner.show{display:flex;}
#update-banner button{cursor:pointer;border-radius:6px;border:none;font-size:13px;font-weight:600;}
#update-confirm-btn{background:#fff;color:var(--teal-dark);padding:6px 14px;}
#update-confirm-btn:hover{background:var(--teal-light);}
#update-dismiss-btn{background:transparent;color:#fff;opacity:.75;font-size:18px;line-height:1;padding:0 4px;}
#update-dismiss-btn:hover{opacity:1;}
@media(max-width:600px){#update-banner{font-size:12.5px;padding:8px 10px;flex-wrap:wrap;}}

.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--ink-faint);padding:5px;border-radius:6px;display:inline-flex;}
.icon-btn:hover{background:var(--cream);color:var(--ink);}
.icon-btn svg{width:16px;height:16px;}

#load-overlay{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:10px;}
#load-overlay .ring{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
#pin-gate{position:fixed;inset:0;background:var(--cream);display:none;align-items:center;justify-content:center;z-index:900;padding:20px;}
#pin-gate.show{display:flex;}
.pin-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:32px 30px;max-width:340px;width:100%;text-align:center;}
.pin-card .pin-logo{width:64px;height:64px;border-radius:14px;overflow:hidden;margin:0 auto 16px;}
.pin-card .pin-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.pin-card h2{font-size:18px;margin-bottom:4px;}
.pin-card .pin-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;}
#pin-select{margin-bottom:14px;}
#pin-input{text-align:center;font-size:20px;letter-spacing:6px;font-family:'Inter',sans-serif;}
#pin-error{font-size:12.5px;color:var(--red);margin-top:10px;min-height:16px;}
.pin-btn-row{margin-top:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

#mobile-nav-toggle{display:none;position:fixed;top:14px;left:14px;z-index:600;width:40px;height:40px;border-radius:10px;background:var(--teal-dark);color:#fff;border:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);}
#mobile-nav-toggle svg{width:20px;height:20px;}
#nav-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:550;}
#nav-backdrop.show{display:block;}

@media(max-width:820px){
  #mobile-nav-toggle{display:flex;}
  #shell{display:block;min-height:auto;}
  #nav{
    position:fixed;top:0;left:0;height:100vh;width:260px;
    flex-direction:column;
    transform:translateX(-100%);
    transition:transform .22s ease;
    z-index:560;
    overflow-y:auto;
  }
  #nav.show{transform:translateX(0);}
  #main{padding:64px 16px 24px;max-width:100%;}
  .page-head{flex-wrap:wrap;gap:12px;align-items:flex-start;}
  .page-head h1{font-size:21px;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .field-row,.field-row3{grid-template-columns:1fr;}
  .modal{padding:20px 18px;}
  table{font-size:12.5px;}
  th,td{padding:9px 6px;}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr;}
  .photo-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
}
</style>
</head>

async function loadData(){
  if(typeof window.supabase==='undefined'){
    console.error('Supabase library failed to load \u2014 check internet connection.');
    connectionStatus='offline';
    DATA={members:[],minutes:[],transactions:[],meta:rowToMeta(null),newsPosts:[],tasks:[],paymentSubmissions:[],committees:[],committeeMembers:[]};
    return;
  }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  await fetchAllData();
  subscribeToRealtime();
}

async function fetchAllData(){
  try{
    const[membersRes,minutesRes,txRes,metaRes,newsRes,tasksRes,paymentsRes,committeesRes,committeeMembersRes]=await Promise.all([
      sb.from('members').select('*'),
      sb.from('minutes').select('*'),
      sb.from('transactions').select('*'),
      sb.from('club_meta').select('*').eq('id',1).maybeSingle(),
      sb.from('news_posts').select('*'),
      sb.from('tasks').select('*'),
      sb.from('payment_submissions').select('*'),
      sb.from('committees').select('*').order('created_at',{ascending:true}),
      sb.from('committee_members').select('*')
    ]);
    if(membersRes.error||minutesRes.error||txRes.error||metaRes.error||newsRes.error||tasksRes.error||paymentsRes.error||committeesRes.error||committeeMembersRes.error){
      throw membersRes.error||minutesRes.error||txRes.error||metaRes.error||newsRes.error||tasksRes.error||paymentsRes.error||committeesRes.error||committeeMembersRes.error;
    }
    DATA={
      members:rowsToMembers(membersRes.data||[]),
      minutes:rowsToMinutes(minutesRes.data||[]),
      transactions:rowsToTransactions(txRes.data||[]),
      meta:rowToMeta(metaRes.data),
      newsPosts:rowsToNewsPosts(newsRes.data||[]),
      tasks:rowsToTasks(tasksRes.data||[]),
      paymentSubmissions:rowsToPaymentSubmissions(paymentsRes.data||[]),
      committees:rowsToCommittees(committeesRes.data||[]),
      committeeMembers:rowsToCommitteeMembers(committeeMembersRes.data||[])
    };
    connectionStatus='connected';
  }catch(e){
    console.error('Failed to load from Supabase:',e);
    connectionStatus='offline';
    if(!DATA||!DATA.members)DATA={members:[],minutes:[],transactions:[],meta:rowToMeta(null),newsPosts:[],tasks:[],paymentSubmissions:[],committees:[],committeeMembers:[]};
  }
}

function subscribeToRealtime(){
  if(realtimeChannel)sb.removeChannel(realtimeChannel);
  realtimeChannel=sb.channel('club-data-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'members'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'minutes'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'club_meta'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'news_posts'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'payment_submissions'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'committees'},handleRealtimeChange)
    .on('postgres_changes',{event:'*',schema:'public',table:'committee_members'},handleRealtimeChange)
    .subscribe(status=>{
      if(status==='SUBSCRIBED'){connectionStatus='connected';render();}
      else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED'){connectionStatus='offline';render();}
    });
}
let realtimeRefreshTimer=null;
function handleRealtimeChange(){
  // Refetch rather than patch in place: simplest way to stay correct
  // given several tables can change together. Debounced so a burst of
  // changes (e.g. restoring a backup) doesn't cause a render storm.
  clearTimeout(realtimeRefreshTimer);
  realtimeRefreshTimer=setTimeout(async()=>{
    await fetchAllData();
    render();
  },150);
}

async function saveData(){
  // Data is now written via the specific RPC calls at the point of change
  // (see updateMemberRemote, addMinutesRemote, etc). This function is kept
  // as a no-op so any code path that still calls it doesn't break, but it

function exportBackup(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='oasis-club-snapshot-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
  showToast('Snapshot downloaded');
}

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.navlink').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  render();
  closeMobileNav();
}
document.querySelectorAll('.navlink').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.page)));

function toggleMobileNav(){
  document.getElementById('nav').classList.toggle('show');
  document.getElementById('nav-backdrop').classList.toggle('show');
}
function closeMobileNav(){
  document.getElementById('nav').classList.remove('show');
  document.getElementById('nav-backdrop').classList.remove('show');
}

function closeModal(){document.getElementById('modal-bg').classList.remove('show');document.getElementById('modal-content').innerHTML='';}
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-bg').classList.add('show');}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal();});

/* ============ PAYMENT EVIDENCE (member-submitted) ============ */
function paymentStatusBadge(p){
  if(p.status==='approved')return'<span class="badge badge-paid">Approved</span>';
  if(p.status==='pending')return'<span class="badge badge-due">Pending review</span>';
  return'<span class="badge badge-overdue">Rejected</span>';
}
function myPaymentSubmissionsList(memberId){
  const mine=DATA.paymentSubmissions.filter(p=>p.memberId===memberId);
  if(!mine.length)return'';
  return`
  <div style="margin-top:14px;">
    <div class="cell-muted" style="margin-bottom:8px;font-weight:500;">Your submissions</div>
    ${mine.map(p=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <div>
            <div style="font-weight:500;font-size:13px;">${p.paymentType==='dues'?'Annual dues':'Building Project contribution'} &middot; ${fmtMoney(p.amount)}</div>
            <div class="cell-muted" style="margin-top:2px;">${fmtDate(p.createdAt.slice(0,10))}</div>
          </div>
          ${paymentStatusBadge(p)}
        </div>
        ${p.status==='rejected'&&p.rejectionReason?`<p class="cell-muted" style="margin-top:6px;"><strong style="color:var(--ink);">Note:</strong> ${escHtml(p.rejectionReason)}</p>`:''}
        ${p.status==='pending'?`<button class="btn" style="font-size:11.5px;padding:4px 10px;margin-top:6px;" onclick="deletePaymentSubmission('${p.id}')">Withdraw</button>`:''}
      </div>`).join('')}
  </div>`;
}
let pendingPaymentProofFile=null;
function openPaymentEvidenceForm(){
  pendingPaymentProofFile=null;
  openModal(`
    <h3>Upload proof of payment</h3>
    <p class="cell-muted" style="margin-top:-6px;">This will be sent to the Treasurer and Financial Secretary for approval. Your records update automatically once approved.</p>
    <form id="payment-evidence-form">
      <div class="field"><label>What is this payment for?</label>
        <select id="pe-type">
          <option value="dues">Annual dues</option>
          <option value="building_project">Building Project contribution</option>
        </select>
      </div>
      <div class="field"><label>Amount paid (&#8358;)</label><input type="number" id="pe-amount" min="1" step="1" required/></div>
      <div class="field"><label>Proof of payment</label>
        <button type="button" class="btn" style="font-size:12.5px;padding:7px 14px;" onclick="document.getElementById('pe-proof').click()">Choose file</button>
        <input type="file" id="pe-proof" accept="image/*,.pdf" style="display:none"/>
        <span id="pe-proof-name" class="cell-muted" style="margin-left:8px;"></span>
        <div class="cell-muted" style="margin-top:4px;">Screenshot or photo of a bank transfer, receipt, or alert. JPG, PNG, or PDF, under 10MB.</div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="pe-submit-btn">Submit</button>
      </div>
    </form>
  `);
  document.getElementById('pe-proof').addEventListener('change',e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>10*1024*1024){showToast('File is too large \u2014 please choose one under 10MB');e.target.value='';return;}
    pendingPaymentProofFile=file;
    document.getElementById('pe-proof-name').textContent=file.name;
  });
  document.getElementById('payment-evidence-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const amount=Number(document.getElementById('pe-amount').value);
    if(!amount||amount<=0){showToast('Please enter a valid amount');return;}
    if(!pendingPaymentProofFile){showToast('Please attach proof of payment');return;}
    const paymentType=document.getElementById('pe-type').value;
    const submitBtn=document.getElementById('pe-submit-btn');
    submitBtn.disabled=true;submitBtn.textContent='Uploading\u2026';
    try{
      const ext=pendingPaymentProofFile.name.split('.').pop();
      const path=`${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
      const{error:uploadError}=await sb.storage.from('payment-proofs').upload(path,pendingPaymentProofFile,{contentType:pendingPaymentProofFile.type});
      if(uploadError)throw uploadError;
      const{data:urlData}=sb.storage.from('payment-proofs').getPublicUrl(path);
      const pin=getCurrentAuthPin();
      const{error:rpcError}=await sb.rpc('submit_payment_evidence',{p_pin:pin,p_payment_type:paymentType,p_amount:amount,p_proof_url:urlData.publicUrl,p_proof_name:pendingPaymentProofFile.name});
      if(rpcError)throw rpcError;
      showToast('Submitted for approval');
      closeModal();
    }catch(err){
      showToast('Could not submit: '+(err.message||'unknown error'));
      submitBtn.disabled=false;submitBtn.textContent='Submit';
    }
  });
}
async function deletePaymentSubmission(id){
  if(!confirm('Withdraw this submission?'))return;
  const pin=getCurrentAuthPin();
  const{error}=await sb.rpc('delete_payment_evidence',{p_pin:pin,p_submission_id:id});
  if(error){showToast('Could not withdraw: '+error.message);return;}
  showToast('Submission withdrawn');
}

/* ============ PAYMENT REVIEW (Treasurer / Financial Secretary) ============ */
function pagePaymentReview(){
  const canReview=isTreasurerSessionNow()||isFinancialSecretarySessionNow();
  if(!canReview){
    return`<div class="page-head"><div><h1>Payment Review</h1></div></div>
    <div class="card"><p class="cell-muted">Only the Treasurer or Financial Secretary can review payment evidence. Log in with one of those roles to see this page.</p></div>`;
  }
  const pending=DATA.paymentSubmissions.filter(p=>p.status==='pending');
  const decided=DATA.paymentSubmissions.filter(p=>p.status!=='pending').slice(0,20);
  const canApprove=isTreasurerSessionNow();
  return`
  <div class="page-head">
    <div><h1>Payment Review</h1><div class="sub">${pending.length} awaiting review${canApprove?'':' \u00b7 Financial Secretary view \u2014 you can reject, only the Treasurer can approve'}</div></div>
  </div>
  ${pending.length?pending.map(p=>paymentReviewCard(p,canApprove)).join(''):emptyState('Nothing pending','New payment evidence from members will appear here.')}
  ${decided.length?`<div class="card-head" style="margin-top:24px;margin-bottom:10px;"><h2 style="font-size:14.5px;">Recently reviewed</h2></div>
  ${decided.map(p=>paymentReviewCard(p,canApprove)).join('')}`:''}
  `;
}
function paymentReviewCard(p,canApprove){
  const mem=DATA.members.find(m=>m.id===p.memberId);
  return`
  <div class="card" style="margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div>
        <div style="font-weight:600;font-size:14.5px;">${mem?escHtml(mem.name):'Unknown member'}</div>
        <div class="cell-muted" style="margin-top:2px;">${p.paymentType==='dues'?'Annual dues':'Building Project contribution'} &middot; ${fmtMoney(p.amount)} &middot; ${fmtDate(p.createdAt.slice(0,10))}</div>
      </div>
      ${paymentStatusBadge(p)}
    </div>
    <a href="${p.proofUrl}" target="_blank" rel="noopener" class="news-attachment-chip">\u{1F5BC}\uFE0F ${escHtml(p.proofName||'View proof')}</a>
    ${p.status==='rejected'&&p.rejectionReason?`<p class="cell-muted" style="margin-top:10px;"><strong style="color:var(--ink);">Rejection note:</strong> ${escHtml(p.rejectionReason)}</p>`:''}
    ${p.status==='pending'?`
    <div class="modal-actions" style="margin-top:14px;justify-content:flex-start;gap:8px;">
      ${canApprove?`<button class="btn btn-primary" style="font-size:12.5px;padding:7px 14px;" onclick="approvePayment('${p.id}')">Approve</button>`:''}
      <button class="btn" style="font-size:12.5px;padding:7px 14px;" onclick="openPaymentRejectPrompt('${p.id}')">Reject</button>
    </div>`:''}
  </div>`;
}
async function approvePayment(id){
  const pin=getCurrentAuthPin();
  const{error}=await sb.rpc('approve_payment_evidence',{p_pin:pin,p_submission_id:id});
  if(error){showToast('Could not approve: '+error.message);return;}
  showToast('Approved \u2014 records updated');
}
function openPaymentRejectPrompt(id){
  openModal(`
    <h3>Reject this submission</h3>
    <div class="field"><label>Reason (shown to the member, optional)</label>
      <textarea id="payment-reject-reason" rows="3" placeholder="e.g. Amount doesn't match the proof, or the image is unreadable"></textarea>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn" onclick="closeModal()">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="rejectPayment('${id}',document.getElementById('payment-reject-reason').value)">Reject submission</button>
    </div>
  `);
}
async function rejectPayment(id,reason){
  const pin=getCurrentAuthPin();
  const{error}=await sb.rpc('reject_payment_evidence',{p_pin:pin,p_submission_id:id,p_reason:reason||null});
  if(error){showToast('Could not reject: '+error.message);return;}
  showToast('Submission rejected');
  closeModal();
}

window.__profilePhotoData=null;
window.__profilePhotoRemoved=false;
function clearProfilePhoto(){
  window.__profilePhotoRemoved=true;
  window.__profilePhotoData=null;
  const nameInput=document.getElementById('pf-name');
  document.getElementById('profile-photo-preview').innerHTML=`<div class="avatar-placeholder-large">${initials(nameInput?nameInput.value:'')}</div>`;
  const memberId=getCurrentMemberId();
  const mem=memberId?DATA.members.find(m=>m.id===memberId):null;
  if(mem)renderIdCardPreview({...mem,photo:''});
}
function setupProfilePage(){
  const memberId=getCurrentMemberId();
  const mem=memberId?DATA.members.find(m=>m.id===memberId):null;
  if(mem)renderIdCardPreview(mem);
  const photoInput=document.getElementById('pf-photo');
  if(photoInput){
    photoInput.addEventListener('change',e=>{
      const file=e.target.files[0];
      if(!file)return;
      if(!file.type.startsWith('image/')){showToast('Please choose an image file');return;}
      if(file.size>2*1024*1024){showToast('Photo is too large \u2014 please choose one under 2MB');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        compressImage(ev.target.result,400,0.82).then(dataUrl=>{
          window.__profilePhotoData=dataUrl;
          window.__profilePhotoRemoved=false;
          document.getElementById('profile-photo-preview').innerHTML=`<img class="avatar-large" src="${dataUrl}"/>`;
          renderIdCardPreview({...mem,photo:dataUrl});
        });
      };
      reader.readAsDataURL(file);
    });
  }
  const profileForm=document.getElementById('profile-form');
  if(profileForm){
    profileForm.addEventListener('submit',async e=>{
      e.preventDefault();
      const memberId=getCurrentMemberId();
      const mem=memberId?DATA.members.find(m=>m.id===memberId):null;
      if(!mem)return;
      const name=document.getElementById('pf-name').value.trim();
      if(!name)return;
      const phone=document.getElementById('pf-phone').value;
      const email=document.getElementById('pf-email').value;
      const photoUpdate=window.__profilePhotoRemoved?'':(window.__profilePhotoData!==null?window.__profilePhotoData:null);
      const submitBtn=e.target.querySelector('button[type=submit]');
      submitBtn.disabled=true;submitBtn.textContent='Saving\u2026';
      try{
        const{error}=await sb.rpc('update_member_profile',{
          p_member_id:mem.id,p_current_pin:mem.pin,
          p_name:name,p_phone:phone,p_email:email,p_photo:photoUpdate
        });
        if(error)throw error;
        window.__profilePhotoData=null;window.__profilePhotoRemoved=false;
        showToast('Profile updated');
      }catch(err){
        submitBtn.disabled=false;submitBtn.textContent='Save changes';
        showToast('Could not save: '+(err.message||'unknown error'));
      }
    });
  }
  const pinForm=document.getElementById('pin-change-form');
  if(pinForm){
    pinForm.addEventListener('submit',async e=>{
      e.preventDefault();
      const memberId=getCurrentMemberId();
      const mem=memberId?DATA.members.find(m=>m.id===memberId):null;
      const errEl=document.getElementById('pin-change-error');
      if(!mem)return;
      const current=document.getElementById('pc-current').value.trim();
      const next=document.getElementById('pc-new').value.trim();
      const confirmPin=document.getElementById('pc-confirm').value.trim();
      if(!/^\d{4}$/.test(next)){errEl.textContent='New PIN must be exactly 4 digits.';return;}
      if(next!==confirmPin){errEl.textContent='New PIN and confirmation do not match.';return;}
      const submitBtn=e.target.querySelector('button[type=submit]');
      submitBtn.disabled=true;submitBtn.textContent='Updating\u2026';
      try{
        const{error}=await sb.rpc('change_member_pin',{
          p_member_id:mem.id,p_current_pin:current,p_new_pin:next
        });
        if(error)throw error;
        sessionStorage.setItem(SESSION_KEY,'member:'+mem.id);
        errEl.textContent='';
        document.getElementById('pc-current').value='';
        document.getElementById('pc-new').value='';
        document.getElementById('pc-confirm').value='';
        showToast('PIN updated successfully');
        populatePinSelect();
      }catch(err){
        errEl.textContent=(err.message||'').includes('Incorrect PIN')?'Current PIN is incorrect.':
          (err.message||'').includes('already in use')?'That PIN is already in use by another member \u2014 please choose a different one.':
          (err.message||'Could not update PIN.');
      }finally{
        submitBtn.disabled=false;submitBtn.textContent='Update PIN';
      }
    });
  }
}

function currentMonthKey(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth()+1;
  return y+'-'+String(m).padStart(2,'0');
}
function todayLong(){return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function daysSince(d){return Math.floor((Date.now()-new Date(d+'T00:00:00').getTime())/86400000);}
function upcomingMeetingDate(){
  const now=new Date();
  let d=new Date(now.getFullYear(),now.getMonth()+1,0);
  while(d.getDay()!==0)d.setDate(d.getDate()-1);
  if(d<now){d=new Date(now.getFullYear(),now.getMonth()+2,0);while(d.getDay()!==0)d.setDate(d.getDate()-1);}
  return d;
}
function getAgmWarning(dateStr){
  if(!dateStr)return'No date set yet \u2014 the AGM date must be decided before November of this club year (Article 10).';
  const d=new Date(dateStr+'T00:00:00');
  if(d.getMonth()>=10){ // 10 = November (0-indexed)
    return'Heads up: this date falls in November or later. Per club rule, the AGM date should be decided/held before November each year.';
  }
  return'';
}

function openMemberForm(id){
  const existing=id?DATA.members.find(x=>x.id===id):null;
  const session=sessionStorage.getItem(SESSION_KEY)||'';
  const isOfficerSession=session.startsWith('role:');
  const isOwnRecord=existing&&session==='member:'+existing.id;
  if(!isOfficerSession&&!isOwnRecord){
    // Not an officer login and not their own record -- nothing here is
    // editable for them, so show a simple read-only view instead of a
    // form that would only fail on submit.
    if(!existing)return; // "Add member" should never reach here since the button is hidden, but guard anyway
    openModal(`
      <h3>${escHtml(existing.name)}</h3>
      <div class="photo-upload-row">
        ${existing.photo?`<img class="avatar-large" src="${existing.photo}"/>`:`<div class="avatar-placeholder-large">${initials(existing.name)}</div>`}
        <div class="cell-muted">Only ${escHtml(existing.name)} or a club officer can edit this record.</div>
      </div>
      <div class="field"><label>Role</label><p style="margin:0;">${escHtml(existing.role||'Member')}</p></div>
      <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Close</button></div>
    `);
    return;
  }
  const canEditPhoto=isOfficerSession||isOwnRecord||!existing; // officers, the member themself, or a brand-new record
  let pendingPhoto=null; // holds a newly-chosen photo (base64) until save
  openModal(`
    <h3>${existing?'Edit member':'Add member'}</h3>
    <form id="member-form">
      ${canEditPhoto?`
      <div class="photo-upload-row">
        <div id="photo-preview">${existing&&existing.photo?`<img class="avatar-large" src="${existing.photo}"/>`:`<div class="avatar-placeholder-large">${initials(existing?existing.name:'')}</div>`}</div>
        <div>
          <input type="file" id="f-photo" accept="image/*" style="display:none"/>
          <button type="button" class="btn" style="font-size:12.5px;padding:6px 12px;" onclick="document.getElementById('f-photo').click()">Choose photo</button>
          ${existing&&existing.photo?`<button type="button" class="btn" style="font-size:12.5px;padding:6px 12px;margin-left:6px;" onclick="clearPendingPhoto()">Remove</button>`:''}
          <div class="cell-muted" style="margin-top:4px;">JPG or PNG, under 2MB</div>
        </div>
      </div>`:`
      <div class="photo-upload-row">
        ${existing&&existing.photo?`<img class="avatar-large" src="${existing.photo}"/>`:`<div class="avatar-placeholder-large">${initials(existing?existing.name:'')}</div>`}
        <div class="cell-muted">Only ${escHtml(existing.name)} can change their own photo.</div>
      </div>`}
      <div class="field"><label>Full name</label><input type="text" id="f-name" value="${existing?escHtml(existing.name):''}" required/></div>
      <div class="field-row">
        <div class="field"><label>Role / office</label>
          <select id="f-role">
            ${['Member','President','Vice-President','Secretary','Assistant Secretary','Treasurer','Financial Secretary','PRO'].map(r=>`<option ${existing&&existing.role===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Status</label>
          <select id="f-status">
            <option value="active" ${!existing||existing.status==='active'?'selected':''}>Active</option>
            <option value="inactive" ${existing&&existing.status==='inactive'?'selected':''}>Inactive</option>
            <option value="suspended" ${existing&&existing.status==='suspended'?'selected':''}>Suspended</option>
            <option value="dismissed" ${existing&&existing.status==='dismissed'?'selected':''}>Dismissed</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Phone</label><input type="tel" id="f-phone" value="${existing?escHtml(existing.phone||''):''}"/></div>
        <div class="field"><label>Joined</label><input type="date" id="f-joined" value="${existing?existing.joined||'':new Date().toISOString().slice(0,10)}"/></div>
      </div>
      <div class="field"><label>Email (optional)</label><input type="email" id="f-email" value="${existing?escHtml(existing.email||''):''}"/></div>
      <p class="cell-muted" style="margin-top:-6px;">Setting status to Suspended or Dismissed immediately blocks this member's app login. Restoring to Active re-enables it.</p>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">${existing?'Save changes':'Add member'}</button>
      </div>
    </form>
  `);
  window.__pendingPhotoRemoved=false;
  window.__pendingPhotoData=null;
  if(canEditPhoto){
    document.getElementById('f-photo').addEventListener('change',e=>{
      const file=e.target.files[0];
      if(!file)return;
      if(!file.type.startsWith('image/')){showToast('Please choose an image file');return;}
      if(file.size>2*1024*1024){showToast('Photo is too large \u2014 please choose one under 2MB');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        compressImage(ev.target.result,400,0.82).then(dataUrl=>{
          window.__pendingPhotoData=dataUrl;
          window.__pendingPhotoRemoved=false;
          document.getElementById('photo-preview').innerHTML=`<img class="avatar-large" src="${dataUrl}"/>`;
        });
      };
      reader.readAsDataURL(file);
    });
  }
  document.getElementById('member-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const name=document.getElementById('f-name').value.trim();
    if(!name)return;
    const newStatus=document.getElementById('f-status').value;
    const role=document.getElementById('f-role').value;
    const phone=document.getElementById('f-phone').value;
    const email=document.getElementById('f-email').value;
    const joined=document.getElementById('f-joined').value||null;
    const photoUpdate=window.__pendingPhotoRemoved?'':(window.__pendingPhotoData!==null?window.__pendingPhotoData:null);
    const submitBtn=e.target.querySelector('button[type=submit]');
    submitBtn.disabled=true;submitBtn.textContent='Saving\u2026';
    try{
      if(existing){
        if(isOwnRecord&&!isOfficerSession){
          // A member editing their own record from here only ever touches
          // name/phone/email/photo -- status/role changes are officer-only
          // and this path doesn't expose those controls changing meaningfully
          // without an officer PIN, so route through the self-service function.
          const{error}=await sb.rpc('update_member_profile',{
            p_member_id:existing.id,p_current_pin:existing.pin,
            p_name:name,p_phone:phone,p_email:email,p_photo:photoUpdate
          });
          if(error)throw error;
        }else{
          const officerPin=getCurrentAuthPin();
          const wasBlocked=existing.status==='suspended'||existing.status==='dismissed';
          const nowBlocked=newStatus==='suspended'||newStatus==='dismissed';
          const{error}=await sb.rpc('officer_upsert_member',{
            p_officer_pin:officerPin,p_id:existing.id,p_name:name,p_role:role,p_status:newStatus,
            p_phone:phone,p_email:email,p_joined:joined,p_photo:photoUpdate,p_pin:existing.pin
          });
          if(error)throw error;
          if(!wasBlocked&&nowBlocked)forceLogoutIfCurrentUser(existing.id);
        }
      }else{
        const officerPin=getCurrentAuthPin();
        const newId=uid();
        const newPin=genUniquePin();
        const{error}=await sb.rpc('officer_upsert_member',{
          p_officer_pin:officerPin,p_id:newId,p_name:name,p_role:role,p_status:newStatus,
          p_phone:phone,p_email:email,p_joined:joined,p_photo:photoUpdate||null,p_pin:newPin
        });
        if(error)throw error;
      }
      closeModal();showToast(existing?'Member updated':'Member added');
    }catch(err){
      submitBtn.disabled=false;submitBtn.textContent=existing?'Save changes':'Add member';
      showToast('Could not save: '+(err.message||'unknown error'));
    }
  });
}
function clearPendingPhoto(){
  window.__pendingPhotoRemoved=true;
  window.__pendingPhotoData=null;

function initials(name){
  if(!name)return'?';
  return name.trim().split(/\s+/).slice(0,2).map(p=>p[0].toUpperCase()).join('');
}
function compressImage(dataUrl,maxDim,quality){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
function forceLogoutIfCurrentUser(memberId){
  if(sessionStorage.getItem(SESSION_KEY)==='member:'+memberId){
    lockApp();
    showToast('Access revoked \u2014 status changed');
  }
}
function genUniquePin(){
  const used=new Set(DATA.members.map(m=>m.pin).filter(Boolean));
  let p;
  do{p=String(Math.floor(1000+Math.random()*9000));}while(used.has(p));
  return p;
}

  if(!confirm('Permanently remove this member record? This cannot be undone.'))return;
  const pin=getCurrentAuthPin();
  try{
    const{error}=await sb.rpc('officer_delete_member',{p_officer_pin:pin,p_member_id:id});
    if(error)throw error;
    showToast('Member removed');
  }catch(e){showToast('Could not remove member: '+(e.message||'unknown error'));}
}

function addYears(dateStr,years){

/* ============ SUB-COMMITTEES ============ */
// Distinct from the officer roster page above ("Committee"). This lets
// officers create named sub-committees (e.g. "Welfare Committee") and
// assign active members to them, with one chairperson each. Other
// features (Welfare Loans) check membership of these via
// isMemberOfCommittee() for access.
function isMemberOfCommittee(committeeName,memberId){
  const committee=(DATA.committees||[]).find(c=>c.name===committeeName);
  if(!committee)return false;
  return (DATA.committeeMembers||[]).some(cm=>cm.committeeId===committee.id&&cm.memberId===memberId);
}
function pageCommittees(){
  if(!isOfficerSessionNow()){
    return `<div class="page-head"><div><h1>Committees</h1></div></div>
    ${emptyState('This page is restricted','Only club officers can manage committees and their membership.')}`;
  }
  const committees=(DATA.committees||[]).slice().sort((a,b)=>a.name.localeCompare(b.name));
  function committeeCard(c){
    const members=(DATA.committeeMembers||[]).filter(cm=>cm.committeeId===c.id);
    return `<div class="card" style="margin-bottom:14px;">
      <div class="card-head">
        <h2>${escHtml(c.name)}</h2>
        <button type="button" class="icon-btn" onclick="deleteCommitteeConfirm('${c.id}','${escHtml(c.name).replace(/'/g,"&#39;")}')" aria-label="Delete committee"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a1 1 0 01-1 1H6a1 1 0 01-1-1V6z"/></svg></button>
      </div>
      ${c.description?`<p class="cell-muted" style="margin:0 0 12px;">${escHtml(c.description)}</p>`:''}
      <div style="margin-bottom:10px;">
        ${members.length?members.map(cm=>{
          const mem=DATA.members.find(m=>m.id===cm.memberId);
          return `<div class="welfare-member-row">
            <span style="flex:1;font-size:13.5px;">${escHtml(mem?mem.name:'Unknown member')}${cm.isChair?' <span class="badge badge-active" style="font-size:10px;margin-left:4px;">Chair</span>':''}</span>
            ${!cm.isChair?`<button type="button" class="btn" style="font-size:11.5px;padding:3px 8px;margin-right:6px;" onclick="setCommitteeChair('${c.id}','${cm.memberId}')">Make chair</button>`:''}
            <button type="button" class="icon-btn" onclick="removeCommitteeMemberConfirm('${c.id}','${cm.memberId}')" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
          </div>`;

  }
  return `<div class="page-head">
    <div><h1>Committees</h1><div class="sub">Add or remove committees and assign members</div></div>

  </div>
  ${committees.length?committees.map(committeeCard).join(''):emptyState('No committees yet','Create your first committee, e.g. Welfare Committee or Project Committee.')}`;
}

    '6. A member may resign from the Association by giving written notice to the Treasurer, copied to the President.',
    '(a) A resigning member shall remain liable for any outstanding subscriptions, which shall be recoverable as a debt due to the Association.',
    '(b) A member who submits a resignation letter but subsequently changes their mind shall, at the discretion of the Committee, be required to pay a re-joining fee of \u20a620,000 (Twenty Thousand Naira).'
  ]},
  {title:'Article 7 \u2014 Expulsion of a Member',body:[
    '7. Subject to giving a member the opportunity to be heard or to make a written submission, the Committee may resolve to expel a member upon a charge of misconduct detrimental to the interest of the Association.',
    '(a) Particulars of the charge shall be communicated to the member at least fifteen (15) working days before the Committee meeting at which the matter will be determined.',
    '(b) The Committee\'s determination shall be communicated to the member. Where the determination is adverse to the member, the member\'s rights and privileges shall be suspended for a period of six (6) calendar months.'
  ]},
  {title:'Article 8 \u2014 The Committee',body:[
    '8.1 Composition',
    '8. The management of the assets and affairs of the Association shall be under the control of a Committee, which shall consist of the following officers:',
    '(a) President',
    '(b) Vice-President',
    '(c) Secretary',
    '(d) Assistant Secretary',
    '(e) Treasurer',
    '(f) Financial Secretary',
    '(g) Public Relations Officer (PRO)',
    '8.2 Collective Functions of the Committee',
    '9. The Committee shall have power to deal with any matter not specifically covered by this Constitution.',
    '10. The Committee shall be elected once every two (2) years by the bona-fide members present at the Annual General Meeting. Members so elected shall take office from the conclusion of the Annual General Meeting at which they are elected and shall hold office until the conclusion of their tenure.',
    '11. Election shall be by the votes of bona-fide members present at the meeting. In the event of a tie, the President, or the person presiding over the meeting, shall have a second or casting vote.',
    '12. The Committee shall have power to fill any casual vacancy arising between Annual General Meetings. A member appointed to such vacancy shall hold office only until the conclusion of the next Annual General Meeting, save that the Committee shall have power to remove such a member before that time and appoint another in their place.',
    '13. The Committee shall meet at such times and places as the President shall direct. Questions arising at any Committee meeting shall be determined by a majority of the votes of members present, and in the case of a tie, the President shall have a second or casting vote. The Committee may adjourn and otherwise regulate the proceedings of its meetings as it thinks fit. Committee meetings shall be held at least once every month, and an additional meeting shall be held whenever requested by at least seven (7) bona-fide members.',
    '8.3 Functions of the President and Vice-President',
    '14. The President, or in their absence the Vice-President, shall chair all meetings of the Association. In the absence of both the President and the Vice-President, the Committee members present shall choose one of their number to act as Chairperson.',
    '15. All acts or decisions made at a meeting by any member shall be as valid and effective as if made in ordinary circumstances, unless it is proved that the relevant appointment was made in fraud or bad faith.',
    '16. The President shall perform the duties usually incumbent on the president of a society of this nature and shall preside at all meetings of the Association.',
    '17. The Vice-President shall perform the duties of the President in the President\'s absence, and the two officers shall agree between themselves the order of precedence for this purpose.',
    '8.4 Functions of the Secretary and Assistant Secretary',
    '18. The Secretary, or in their absence the Assistant Secretary, shall attend all meetings of the Association and of the Committee and shall have custody of all books and records of the Association, except those ordinarily kept by the Treasurer. The Secretary shall, subject to the directions of the Committee, carry out all secretarial duties of the Association, including the summoning of all meetings.',
    '8.5 Functions of the Treasurer',
    '19. The Treasurer shall attend to the payment of all accounts approved for payment by the Committee, prepare the annual statement of receipts and expenditure, assets and liabilities for presentation at the Annual General Meeting, and shall be responsible for ensuring that the Association\'s books are audited each year by the auditor. The Treasurer shall keep proper records of all receipts, expenditure, assets, and liabilities of the Association and of its members, and shall present a short summary of amounts received and expended since the preceding meeting at every monthly Committee meeting.',
    '8.6 Functions of the Public Relations Officer',
    '20. The Public Relations Officer shall be responsible for the Association\'s public image and external communications, and shall in particular:',
    '(a) publicise the activities, programmes, and achievements of the Association to members and to the wider public;',
    '(b) serve as the principal point of contact between the Association and external bodies, sister clubs, the media, and the host community;',
    '(c) coordinate publicity and media arrangements for the Association\'s events, including the annual dinner dance, concerts, and community development activities;',
    '(d) promote a positive public image of the Association and safeguard its reputation; and',
    '(e) perform such other public relations duties as the Committee may from time to time direct.'
  ]},
  {title:'Article 9 \u2014 Disqualification of Committee Members',body:[
    '21. The office of a Committee member shall become vacant if that member:',
    '(a) is disqualified by a general decision of bona-fide members;',
    '(b) is expelled under this Constitution;',
    '(c) is permanently incapacitated by ill health;',
    '(d) is absent without apology for more than three (3) consecutive meetings, or for more than three (3) Committee meetings in a financial year; or',
    '(e) ceases to be a bona-fide member of the Association.'
  ]},
  {title:'Article 10 \u2014 Meetings of the Association',body:[
    '22. An Annual General Meeting of the Association shall be held on the 26th day of December each year, at such time and place as the Committee shall determine.',
    '23. Notice of the Annual General Meeting shall be given to every member in such manner as the Committee shall direct, and such notice shall be given at least twenty-one (21) days before the date fixed for the meeting and shall specify the date, time, and place of the meeting.',
    '24. A Special General Meeting may be held at any time and for any purpose, whenever directed by the President or requested in writing by at least seven (7) bona-fide members, who shall specify the purpose for which the meeting is requested. A Special General Meeting shall be called on twenty-one (21) days\' notice to members, specifying the date, time, and place of the meeting.',
    '25. The accidental omission to give notice of a meeting to any member, or the non-receipt of such notice by any member, shall not invalidate or affect any proceedings or election at that meeting.',
    '26. No business shall be transacted at any meeting of the Association or of the Committee unless a quorum is present. The quorum for a Committee meeting shall be one (1) more than half the number of Committee members. The quorum for a General Meeting shall be two-thirds (2/3) of bona-fide members.',
    '27. Monthly meetings shall be held on the last Sunday of every month. If, within one hour of the time fixed for a meeting, a quorum is not present, the meeting shall stand adjourned to such time and place as the Chairperson of the meeting shall decide, save that in the case of a Special General Meeting called upon requisition, the meeting shall lapse.'
  ]},
  {title:'Article 11 \u2014 Minutes',body:[
    '28. Proper minutes of all meetings of the Association and of the Committee shall be kept, duly authenticated by the Chairperson of the meeting, and publicly displayed within twenty-one (21) days of the meeting.'
  ]},
  {title:'Article 12 \u2014 Finance and the Financial Year',body:[
    '29. The financial year of the Association shall commence on 1 October each year and end on 30 September of the following year.',
    '30. The Association shall open a bank account in its name with a bank as the Committee shall from time to time determine. All payments from such account shall be made either by cheque signed by any two signatories or by electronic funds transfer authorised by any two signatories. The signatories to the account shall be the President, the Secretary, and the Treasurer.'
  ]},
  {title:'Article 13 \u2014 Accounts and Audit',body:[
    '31. The Association shall keep such accounting records as are necessary to correctly record and explain its financial transactions and financial position.',
    '32. A statement of receipts and expenditure for the preceding twelve (12) months, together with a balance sheet of the assets and liabilities of the Association, shall be presented at the Annual General Meeting each year.',
    '33. All offices in the Association shall be held on an honorary (unpaid) basis.',
    '34. No surplus made by the Association, and no money on hand or received by it in excess of expenditure, shall at any time be returned or paid, directly or indirectly, as profit or dividend to members or any class of members. All such surplus shall be applied for the benefit of the Association and in furtherance of its objectives, in such manner as the Committee shall from time to time decide.',
    '35. The Association may invite and accept contributions from Oasis Club members or other well-wishers in support of its objectives.',
    '36. The Association shall appoint an Auditor, who shall be a Certified Accountant, for the purpose of auditing the Association\'s records before each Annual General Meeting.'
  ]},
  {title:'Article 14 \u2014 Amendment of Rules',body:[
    '37. This Constitution may be amended by a resolution passed by a two-thirds (2/3) majority of bona-fide members present and voting at any Annual or Special General Meeting of the Association.'
  ]},
  {title:'Article 15 \u2014 Winding Up',body:[
    '38. The Association may be wound up in the manner provided for in Part C of the Companies and Allied Matters Act 1990, as amended.',
    '39. If, after winding up, there remain surplus assets as defined in the Act, such surplus assets shall be sold, and the proceeds of sale shall be donated to a charitable organisation determined by the Committee at the time notice of dissolution is given.'
  ]},
  {title:'Article 16 \u2014 Solicitors',body:[
    '40. The Solicitors for the Association shall be appointed by the Committee, or by members in a General Meeting.'
  ]},
  {title:'Adoption',body:[
    'This Constitution was adopted by resolution of the members of OASIS CLUB OF OTUN EKITI at a General Meeting held on the date indicated below, and shall take effect immediately.',
    'President: ______________________________ Date: ___________________',
    'Secretary: ______________________________ Date: ___________________'
  ]}
];

  ${CONSTITUTION_ARTICLES.map(a=>`
  <div class="card" style="margin-bottom:14px;">
    <div class="card-head"><h2 style="font-size:15px;">${escHtml(a.title)}</h2></div>
    ${a.body.map(p=>{
      const isLettered=/^\([a-z]\)/.test(p.trim());

function setupNewsPage(){
  updateNewsBadge();
}
function updateNewsBadge(){
  const badge=document.getElementById('news-pending-badge');
  if(!badge)return;
  const count=pendingNewsCountForReviewer();
  if(count>0){badge.textContent=count;badge.style.display='';}
  else{badge.style.display='none';}
}
function updatePaymentBadge(){
  const badge=document.getElementById('payment-pending-badge');
  if(!badge)return;
  const count=pendingPaymentCountForReviewer();
  if(count>0){badge.textContent=count;badge.style.display='';}
  else{badge.style.display='none';}
}
function setupConstitutionPage(){
  const fileInput=document.getElementById('constitution-file');
  if(!fileInput)return;
  fileInput.addEventListener('change',async e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.type!=='application/pdf'){showToast('Please choose a PDF file');return;}
    if(file.size>10*1024*1024){showToast('PDF is too large \u2014 please choose one under 10MB');return;}
    showToast('Uploading\u2026');
    try{
      const path='oasis-club-constitution.pdf';
      const{error:uploadError}=await sb.storage.from('constitution').upload(path,file,{upsert:true,contentType:'application/pdf'});
      if(uploadError)throw uploadError;
      const{data:urlData}=sb.storage.from('constitution').getPublicUrl(path);
      const cacheBustedUrl=urlData.publicUrl+'?v='+Date.now();
      const pin=getCurrentAuthPin();
      const{error:rpcError}=await sb.rpc('officer_update_constitution_url',{p_pin:pin,p_url:cacheBustedUrl});
      if(rpcError)throw rpcError;
      showToast('Constitution PDF updated');
    }catch(err){
      showToast('Upload failed: '+(err.message||'unknown error'));
    }
  });
}

/* ============ NEWS & NOTICES PAGE ============ */
function newsStatusBadge(p){
  if(p.status==='approved')return'';
  if(p.status==='pending')return'<span class="badge badge-due">Pending review</span>';
  return'<span class="badge badge-overdue">Not approved</span>';
}
function newsAttachmentIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','webp','gif'].includes(ext))return'\u{1F5BC}\uFE0F';
  if(ext==='pdf')return'\u{1F4C4}';
  if(['doc','docx'].includes(ext))return'\u{1F4DD}';
  if(['xls','xlsx'].includes(ext))return'\u{1F4CA}';
  return'\u{1F4CE}';
}
function pageNews(){
  const myId=getCurrentMemberId();
  const reviewer=isNewsReviewerNow();
  const posts=visibleNewsPosts();
  const pendingForReview=reviewer?posts.filter(p=>p.status==='pending'):[];
  const rest=posts.filter(p=>!(reviewer&&p.status==='pending'));
  return`
  <div class="page-head">
    <div><h1>News &amp; Notices</h1><div class="sub">${reviewer?'Reviewing as '+escHtml(DATA.members.find(m=>m.id===myId)?.role||''):'Shared by club members'}</div></div>
    ${myId?`<button class="btn btn-primary" onclick="openPostComposer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Write a post</button>`:''}
  </div>
  ${pendingForReview.length?`
  <div class="card" style="border-left:3px solid var(--gold);margin-bottom:18px;">
    <div class="card-head"><h2 style="font-size:14.5px;">Awaiting your review (${pendingForReview.length})</h2></div>
    ${pendingForReview.map(p=>newsPostCard(p,true)).join('')}
  </div>`:''}
  ${rest.length?rest.map(p=>newsPostCard(p,false)).join(''):(pendingForReview.length?'':emptyState('No posts yet','Be the first to share club news \u2014 write a post above.'))}
  `;
}
function newsPostCard(p,inReviewQueue){
  const author=DATA.members.find(m=>m.id===p.authorId);
  const myId=getCurrentMemberId();
  const reviewer=isNewsReviewerNow();
  const isMine=myId===p.authorId;
  const canDelete=isOfficerSessionNow()||(isMine&&p.status!=='approved');
  return`
  <div class="card" style="margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div>
        <div style="font-weight:600;font-size:15px;color:var(--teal-dark);">${escHtml(p.title)}</div>
        <div class="cell-muted" style="margin-top:2px;">${author?escHtml(author.name):'Unknown member'} &middot; ${fmtDate(p.createdAt.slice(0,10))} ${newsStatusBadge(p)?'&middot; '+newsStatusBadge(p):''}</div>
      </div>
      ${canDelete?`<button class="icon-btn" onclick="deleteNewsPost('${p.id}')" aria-label="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a1 1 0 01-1 1H6a1 1 0 01-1-1V6z"/></svg></button>`:''}
    </div>
    <div class="news-body" style="margin-top:10px;font-size:13.5px;line-height:1.55;">${p.bodyHtml}</div>
    ${p.attachmentUrl?`<a href="${p.attachmentUrl}" target="_blank" rel="noopener" class="news-attachment-chip">${newsAttachmentIcon(p.attachmentName)} ${escHtml(p.attachmentName||'Attachment')}</a>`:''}
    ${p.status==='rejected'&&p.rejectionReason?`<p class="cell-muted" style="margin-top:10px;"><strong style="color:var(--ink);">Reviewer note:</strong> ${escHtml(p.rejectionReason)}</p>`:''}
    ${reviewer&&p.status==='pending'?`
    <div class="modal-actions" style="margin-top:14px;justify-content:flex-start;gap:8px;">
      <button class="btn btn-primary" style="font-size:12.5px;padding:7px 14px;" onclick="reviewNewsPost('${p.id}','approved')">Approve</button>
      <button class="btn" style="font-size:12.5px;padding:7px 14px;" onclick="openRejectPrompt('${p.id}')">Reject</button>
    </div>`:''}
  </div>`;
}
async function deleteNewsPost(id){
  if(!confirm('Remove this post?'))return;
  const pin=getCurrentAuthPin();
  const{error}=await sb.rpc('delete_news_post',{p_pin:pin,p_post_id:id});
  if(error){showToast('Could not delete: '+error.message);return;}
  showToast('Post removed');
}
async function reviewNewsPost(id,decision,reason){
  const pin=getCurrentAuthPin();
  const{error}=await sb.rpc('review_news_post',{p_pin:pin,p_post_id:id,p_decision:decision,p_rejection_reason:reason||null});
  if(error){showToast('Could not review post: '+error.message);return;}
  showToast(decision==='approved'?'Post approved and published':'Post rejected');
  closeModal();
}
function openRejectPrompt(id){
  openModal(`
    <h3>Reject this post</h3>
    <div class="field"><label>Reason (shown to the author, optional)</label>
      <textarea id="reject-reason" rows="3" placeholder="e.g. Needs more detail, or isn't club-related"></textarea>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn" onclick="closeModal()">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="reviewNewsPost('${id}','rejected',document.getElementById('reject-reason').value)">Reject post</button>
    </div>
  `);
}

/* ============ RICH TEXT COMPOSER ============ */
let pendingNewsAttachment=null; // {file, name} held until save
function openPostComposer(){
  pendingNewsAttachment=null;
  openModal(`
    <h3>Write a post</h3>
    <p class="cell-muted" style="margin-top:-6px;">Posts are reviewed by the President or PRO before they're visible to everyone.</p>
    <div class="field"><label>Title</label>
      <input type="text" id="post-title" maxlength="120" placeholder="e.g. Save the date: end-of-year dinner dance"/>
    </div>
    <div class="field">
      <label>Message</label>
      <div class="rte-toolbar" id="rte-toolbar">
        <button type="button" data-cmd="bold" title="Bold"><b>B</b></button>
        <button type="button" data-cmd="italic" title="Italic"><i>I</i></button>
        <button type="button" data-cmd="underline" title="Underline"><u>U</u></button>
        <span class="rte-sep"></span>
        <button type="button" data-cmd="insertUnorderedList" title="Bulleted list">&#8226;&#8226;&#8226;</button>
        <button type="button" data-cmd="insertOrderedList" title="Numbered list">1.2.3.</button>
        <span class="rte-sep"></span>
        <label class="rte-color-label" title="Text colour">A<input type="color" id="rte-color" value="#1c2b28"/></label>
      </div>
      <div id="rte-editor" class="rte-editor" contenteditable="true" data-placeholder="Write your update here\u2026"></div>
    </div>
    <div class="field">
      <label>Attachment (optional)</label>
      <button type="button" class="btn" style="font-size:12.5px;padding:7px 14px;" onclick="document.getElementById('post-attachment').click()">Choose file</button>
      <input type="file" id="post-attachment" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none"/>
      <span id="post-attachment-name" class="cell-muted" style="margin-left:8px;"></span>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn" onclick="closeModal()">Cancel</button>
      <button type="button" class="btn btn-primary" id="post-submit-btn" onclick="submitNewsPost()">Submit for review</button>
    </div>
  `);
  setupRteToolbar();
  const fileInput=document.getElementById('post-attachment');
  fileInput.addEventListener('change',e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>15*1024*1024){showToast('File is too large \u2014 please choose one under 15MB');fileInput.value='';return;}
    pendingNewsAttachment=file;
    document.getElementById('post-attachment-name').textContent=file.name;
  });
}
function setupRteToolbar(){
  const toolbar=document.getElementById('rte-toolbar');
  const editor=document.getElementById('rte-editor');
  editor.focus();
  toolbar.querySelectorAll('button[data-cmd]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      editor.focus();
      document.execCommand(btn.dataset.cmd,false,null);
    });
  });
  document.getElementById('rte-color').addEventListener('input',e=>{
    editor.focus();
    document.execCommand('foreColor',false,e.target.value);
  });
}
async function submitNewsPost(){
  const title=document.getElementById('post-title').value.trim();
  const editor=document.getElementById('rte-editor');
  const rawHtml=editor.innerHTML.trim();
  if(!title){showToast('Please add a title');return;}
  if(!rawHtml||rawHtml==='<br>'){showToast('Please write a message');return;}
  const bodyHtml=sanitizeNewsHtml(rawHtml);
  const submitBtn=document.getElementById('post-submit-btn');
  submitBtn.disabled=true;submitBtn.textContent='Submitting\u2026';
  try{
    let attachmentUrl=null,attachmentName=null;
    if(pendingNewsAttachment){
      const ext=pendingNewsAttachment.name.split('.').pop();
      const path=`${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
      const{error:uploadError}=await sb.storage.from('news-attachments').upload(path,pendingNewsAttachment,{contentType:pendingNewsAttachment.type});
      if(uploadError)throw uploadError;
      const{data:urlData}=sb.storage.from('news-attachments').getPublicUrl(path);
      attachmentUrl=urlData.publicUrl;
      attachmentName=pendingNewsAttachment.name;
    }
    const pin=getCurrentAuthPin();
    const{error:rpcError}=await sb.rpc('submit_news_post',{p_pin:pin,p_title:title,p_body_html:bodyHtml,p_attachment_url:attachmentUrl,p_attachment_name:attachmentName});
    if(rpcError)throw rpcError;
    showToast('Submitted for review');
    closeModal();
  }catch(err){
    showToast('Could not submit: '+(err.message||'unknown error'));
    submitBtn.disabled=false;submitBtn.textContent='Submit for review';
  }
}

/* ============ TASK BOARD ============ */
const TASK_CATEGORIES=['Building Project','Events','Admin','Welfare','General'];
const TASK_STATUSES=[
  {key:'todo',label:'To Do'},
  {key:'in_progress',label:'In Progress'},
  {key:'done',label:'Done'}
];
let taskCategoryFilter='all';
function pageTasks(){
  const myId=getCurrentMemberId();
  const counts=TASK_CATEGORIES.reduce((acc,c)=>{acc[c]=DATA.tasks.filter(t=>t.category===c).length;return acc;},{});
  const filtered=taskCategoryFilter==='all'?DATA.tasks:DATA.tasks.filter(t=>t.category===taskCategoryFilter);
  const totalOpen=DATA.tasks.filter(t=>t.status!=='done').length;
  return`
  <div class="page-head">
    <div><h1>Project Board</h1><div class="sub">${DATA.tasks.length} task${DATA.tasks.length===1?'':'s'} &middot; ${totalOpen} still open</div></div>
    ${myId?`<button class="btn btn-primary" onclick="openTaskForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New task</button>`:''}
  </div>
  <div class="seg" style="margin-bottom:18px;flex-wrap:wrap;width:fit-content;">
    <button class="${taskCategoryFilter==='all'?'on':''}" onclick="setTaskCategoryFilter('all')">All (${DATA.tasks.length})</button>
    ${TASK_CATEGORIES.map(c=>`<button class="${taskCategoryFilter===c?'on':''}" onclick="setTaskCategoryFilter('${c}')">${escHtml(c)} (${counts[c]})</button>`).join('')}
  </div>
  <div class="task-board">
    ${TASK_STATUSES.map(col=>{
      const colTasks=filtered.filter(t=>t.status===col.key);
      return`
      <div class="task-column">
        <div class="task-column-head">
          <span>${col.label}</span><span class="task-column-count">${colTasks.length}</span>
        </div>
        ${colTasks.length?colTasks.map(t=>taskCard(t,col.key)).join(''):`<div class="task-column-empty">No tasks</div>`}
      </div>`;
    }).join('')}
  </div>`;
}
function setTaskCategoryFilter(cat){taskCategoryFilter=cat;render();}
function taskCard(t,currentStatusKey){
  const assignee=t.assigneeId?DATA.members.find(m=>m.id===t.assigneeId):null;
  const creator=DATA.members.find(m=>m.id===t.createdBy);
  const otherStatuses=TASK_STATUSES.filter(s=>s.key!==currentStatusKey);
  const canAct=!!getCurrentMemberId(); // officer-login sessions have no personal PIN to authorize a move
  return`
  <div class="task-card">
    <div class="task-card-cat">${escHtml(t.category)}</div>
    <div class="task-card-title" onclick="openTaskForm('${t.id}')">${escHtml(t.title)}</div>
    ${t.notes?`<div class="task-card-notes">${escHtml(t.notes)}</div>`:''}
    <div class="task-card-footer">
      <span class="task-card-assignee">${assignee?'\u{1F464} '+escHtml(assignee.name):creator?'Added by '+escHtml(creator.name):''}</span>
    </div>
    ${canAct?`<div class="task-card-actions">
      ${otherStatuses.map(s=>{
        const label=s.key==='done'?'Mark done \u2713':s.key==='todo'?'\u2190 To Do':'\u2192 In Progress';
        return`<button class="task-move-btn" onclick="moveTask('${t.id}','${s.key}')">${label}</button>`;
      }).join('')}
    </div>`:''}
  </div>`;
}
async function moveTask(taskId,newStatus){
  const t=DATA.tasks.find(x=>x.id===taskId);
  if(!t)return;
  const pin=getCurrentAuthPin();
  if(!pin){showToast('Please log in to move tasks');return;}
  const{error}=await sb.rpc('update_task',{p_pin:pin,p_task_id:taskId,p_title:t.title,p_notes:t.notes||null,p_category:t.category,p_status:newStatus,p_assignee_id:t.assigneeId||null});
  if(error){showToast('Could not move task: '+error.message);return;}
  showToast('Task updated');
}
async function deleteTask(taskId){
  if(!confirm('Delete this task?'))return;
  const pin=getCurrentAuthPin();
  const{error}=await sb.rpc('delete_task',{p_pin:pin,p_task_id:taskId});
  if(error){showToast('Could not delete: '+error.message);return;}
  showToast('Task deleted');
  closeModal();
}
function openTaskForm(taskId){
  const existing=taskId?DATA.tasks.find(t=>t.id===taskId):null;
  const myId=getCurrentMemberId();
  if(!myId){showToast('Please log in to create or edit tasks');return;}
  const activeMembers=DATA.members.filter(isActiveMember);
  openModal(`
    <h3>${existing?'Edit task':'New task'}</h3>
    <form id="task-form">
      <div class="field"><label>Title</label><input type="text" id="task-title" maxlength="120" value="${existing?escHtml(existing.title):''}" required/></div>
      <div class="field-row">
        <div class="field"><label>Category</label>
          <select id="task-category">${TASK_CATEGORIES.map(c=>`<option value="${c}" ${existing&&existing.category===c?'selected':''}>${escHtml(c)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Assign to (optional)</label>
          <select id="task-assignee">
            <option value="">&mdash; unassigned &mdash;</option>
            ${activeMembers.map(m=>`<option value="${m.id}" ${existing&&existing.assigneeId===m.id?'selected':''}>${escHtml(m.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field"><label>Notes (optional)</label><textarea id="task-notes" rows="3">${existing?escHtml(existing.notes||''):''}</textarea></div>
      ${existing?`<div class="field"><label>Status</label>
        <select id="task-status">${TASK_STATUSES.map(s=>`<option value="${s.key}" ${existing.status===s.key?'selected':''}>${s.label}</option>`).join('')}</select>
      </div>`:''}
      <div class="modal-actions" style="${existing?'justify-content:space-between;':'justify-content:flex-end;'}">
        ${existing?`<button type="button" class="btn" style="color:var(--red);" onclick="deleteTask('${existing.id}')">Delete</button>`:''}
        <div style="display:flex;gap:8px;">
          <button type="button" class="btn" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">${existing?'Save changes':'Add task'}</button>
        </div>
      </div>
    </form>
  `);
  document.getElementById('task-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const title=document.getElementById('task-title').value.trim();
    if(!title){showToast('Please add a title');return;}
    const category=document.getElementById('task-category').value;
    const assigneeId=document.getElementById('task-assignee').value||null;
    const notes=document.getElementById('task-notes').value.trim()||null;
    const pin=getCurrentAuthPin();
    if(existing){
      const status=document.getElementById('task-status').value;
      const{error}=await sb.rpc('update_task',{p_pin:pin,p_task_id:existing.id,p_title:title,p_notes:notes,p_category:category,p_status:status,p_assignee_id:assigneeId});
      if(error){showToast('Could not save: '+error.message);return;}
      showToast('Task updated');
    }else{
      const{error}=await sb.rpc('create_task',{p_pin:pin,p_title:title,p_category:category,p_notes:notes,p_assignee_id:assigneeId});
      if(error){showToast('Could not add task: '+error.message);return;}
      showToast('Task added');
    }
    closeModal();
  });
}
