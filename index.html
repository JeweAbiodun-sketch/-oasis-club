function memberJoinYear(mem){
  if(!mem.joined)return'';
  const d=new Date(mem.joined+'T00:00:00');
  return isNaN(d)?'':String(d.getFullYear());
}
// Builds the card face as an SVG string. Kept dependency-free (no
// html2canvas etc) so a single embedded photo + a small amount of
// vector decoration is all that needs rendering.
function buildIdCardSvg(mem){
  const w=ID_CARD_W,h=ID_CARD_H;
  const joinYear=memberJoinYear(mem);
  const photoR=58,photoCx=110,photoCy=150;
  const initialsTxt=initials(mem.name);
  const statusLabel=mem.status==='inactive'?'INACTIVE':'ACTIVE MEMBER';
  const statusColor=mem.status==='inactive'?'#9a958a':'#D9B45C';
  // A thin guilloche-style ring of dashes around the photo for a
  // "security pattern" feel, the way printed ID cards often have.
  let ring='';
  for(let i=0;i<48;i++){
    const angle=(i/48)*2*Math.PI;
    const r1=photoR+9,r2=photoR+13;
    const x1=photoCx+r1*Math.cos(angle),y1=photoCy+r1*Math.sin(angle);

async function downloadIdCard(memberId){
  const mem=DATA.members.find(m=>m.id===memberId);
  if(!mem){showToast('Member not found');return;}
  try{
    const blob=await renderIdCardToPngBlob(mem);
    const dlUrl=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=dlUrl;
    a.download=`oasis-club-id-${mem.name.toLowerCase().replace(/[^a-z0-9]+/g,'-')}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    // The automatic download above works on desktop browsers and
    // Android Chrome. iOS Safari frequently ignores the download
    // attribute and just sits there having "done nothing" -- so also
    // show the finished image in a modal with a save hint. Tapping and
    // holding any visible image to save it has always worked on iPhone,
    // even when the programmatic download path doesn't.
    openModal(`
      <h3>Your ID card</h3>
      <p class="cell-muted" style="margin-top:-6px;">A download should have started. If nothing happened (common on iPhone), press and hold the image below and choose "Save Image".</p>
      <img src="${dlUrl}" alt="Oasis Club ID card" style="width:100%;border-radius:14px;margin-top:8px;"/>
      <div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">Close</button></div>
    `);
    setTimeout(()=>URL.revokeObjectURL(dlUrl),60000);
    showToast('ID card ready');
  }catch(err){
    console.error('ID card download failed:',err);
    showToast('Could not generate the ID card image');
  }
}
// Draws the card directly on a <canvas> using native canvas drawing
// calls (gradients, arcs, text, clipped photo) rather than rasterizing
// an SVG string. This matters: an SVG containing an embedded base64
// <image> (the member's photo) taints the canvas in every major
// browser once drawn via drawImage(), which makes canvas.toBlob()
// throw and silently breaks the download. Drawing natively avoids
// that path entirely, so this version works the same on phone or
// desktop, and with or without a member photo.
function renderIdCardToPngBlob(mem){
  return new Promise((resolve,reject)=>{
    const scale=2; // crisp on high-DPI screens/printing
    const w=ID_CARD_W,h=ID_CARD_H;
    const canvas=document.createElement('canvas');
    canvas.width=w*scale;canvas.height=h*scale;
    const ctx=canvas.getContext('2d');
    ctx.scale(scale,scale);

    const photoR=58,photoCx=110,photoCy=150;
    const joinYear=memberJoinYear(mem);
    const statusLabel=mem.status==='inactive'?'INACTIVE':'ACTIVE MEMBER';
    const statusColor=mem.status==='inactive'?'#9a958a':'#D9B45C';
    const gold='#D9B45C';

    function roundedRectPath(x,y,width,height,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+width,y,x+width,y+height,r);
      ctx.arcTo(x+width,y+height,x,y+height,r);
      ctx.arcTo(x,y+height,x,y,r);
      ctx.arcTo(x,y,x+width,y,r);
      ctx.closePath();
    }
    function drawStaticPart(){
      // background gradient
      const grad=ctx.createLinearGradient(0,0,w,h);
      grad.addColorStop(0,'#0F6E56');
      grad.addColorStop(1,'#063D30');
      roundedRectPath(0,0,w,h,20);
      ctx.fillStyle=grad;ctx.fill();
      // border
      roundedRectPath(3,3,w-6,h-6,17);
      ctx.strokeStyle=gold;ctx.lineWidth=2;ctx.globalAlpha=0.8;ctx.stroke();ctx.globalAlpha=1;
      // faint decorative circles
      ctx.fillStyle='rgba(255,255,255,0.04)';
      ctx.beginPath();ctx.arc(w-60,60,120,0,2*Math.PI);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.03)';
      ctx.beginPath();ctx.arc(w-20,h-30,90,0,2*Math.PI);ctx.fill();
      // header
      ctx.fillStyle='#FBF8F2';
      ctx.font="700 20px Georgia, 'Source Serif 4', serif";
      ctx.textBaseline='alphabetic';
      ctx.fillText('OASIS CLUB',32,42);
      ctx.fillStyle=gold;
      ctx.font='10.5px Inter, sans-serif';
      ctx.fillText('OF OTUN EKITI \u00B7 MEMBERSHIP CARD',32,60);
      ctx.strokeStyle=gold;ctx.globalAlpha=0.4;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(32,72);ctx.lineTo(w-32,72);ctx.stroke();ctx.globalAlpha=1;
      // guilloche-style ring of dashes around the photo
      ctx.strokeStyle=gold;ctx.lineWidth=1.4;ctx.globalAlpha=0.55;
      for(let i=0;i<48;i++){
        const angle=(i/48)*2*Math.PI;
        const r1=photoR+9,r2=photoR+13;
        ctx.beginPath();
        ctx.moveTo(photoCx+r1*Math.cos(angle),photoCy+r1*Math.sin(angle));
        ctx.lineTo(photoCx+r2*Math.cos(angle),photoCy+r2*Math.sin(angle));
        ctx.stroke();
      }
      ctx.globalAlpha=1;
      ctx.strokeStyle=gold;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(photoCx,photoCy,photoR+4,0,2*Math.PI);ctx.stroke();
      // name and details
      ctx.fillStyle='#FBF8F2';
      ctx.font="700 26px Georgia, 'Source Serif 4', serif";
      ctx.fillText(mem.name,200,120);
      ctx.fillStyle=gold;
      ctx.font='13px Inter, sans-serif';
      ctx.fillText((mem.role||'Member').toUpperCase(),200,146);
      ctx.fillStyle='#cfe9e0';
      ctx.font='11px Inter, sans-serif';
      ctx.fillText('MEMBER ID',200,184);
      ctx.fillText('MEMBER SINCE',340,184);
      ctx.fillStyle='#FBF8F2';
      ctx.font='600 15px Inter, sans-serif';
      ctx.fillText(mem.id.toUpperCase(),200,202);
      ctx.fillText(joinYear||'\u2014',340,202);
      // status chip
      roundedRectPath(200,222,150,26,13);
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
      ctx.strokeStyle=statusColor;ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle=statusColor;
      ctx.beginPath();ctx.arc(216,235,4,0,2*Math.PI);ctx.fill();
      ctx.font='600 11px Inter, sans-serif';
      ctx.fillText(statusLabel,228,239);
      // footer
      ctx.strokeStyle=gold;ctx.globalAlpha=0.4;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(32,h-56);ctx.lineTo(w-32,h-56);ctx.stroke();ctx.globalAlpha=1;
      ctx.fillStyle='#9fc9bc';
      ctx.font='9.5px Inter, sans-serif';
      ctx.fillText('This card identifies the holder as a member in good standing of',32,h-32);
      ctx.fillText('Oasis Club of Otun Ekiti. Not transferable.',32,h-18);
      ctx.textAlign='right';
      ctx.fillText('Article 4, Constitution',w-32,h-18);
      ctx.textAlign='left';
    }
    function drawPhotoOrInitials(){
      ctx.save();
      ctx.beginPath();ctx.arc(photoCx,photoCy,photoR,0,2*Math.PI);ctx.clip();
      if(mem.photo){
        // Drawn after clipping, so it's cropped to the circle. This is
        // a plain <img>-to-canvas draw (no SVG wrapper), which does NOT
        // taint the canvas for same-origin/data-URI sources.
        const photoImg=new Image();
        photoImg.onload=()=>{
          const size=photoR*2;
          const ratio=Math.max(size/photoImg.width,size/photoImg.height);
          const dw=photoImg.width*ratio,dh=photoImg.height*ratio;
          ctx.drawImage(photoImg,photoCx-dw/2,photoCy-dh/2,dw,dh);
          ctx.restore();
          finish();
        };
        photoImg.onerror=()=>{ctx.restore();reject(new Error('Photo failed to load'));};
        photoImg.src=mem.photo;
      }else{
        ctx.fillStyle='#0a5a47';
        ctx.fillRect(photoCx-photoR,photoCy-photoR,photoR*2,photoR*2);
        ctx.restore();
        ctx.fillStyle=gold;
        ctx.font='600 32px Inter, sans-serif';
        ctx.textAlign='center';
        ctx.fillText(initials(mem.name),photoCx,photoCy+9);
        ctx.textAlign='left';
        finish();
      }
    }
    function drawLogo(onDone){
      // Same plain <img>-to-canvas pattern as the member photo -- a
      // base64 data URI drawn directly never taints the canvas, so
      // this is safe to export, unlike wrapping it in an SVG <image>.
      const logoCx=w-56,logoCy=40,logoR=27;
      const logoImg=new Image();
      logoImg.onload=()=>{
        ctx.save();
        ctx.beginPath();ctx.arc(logoCx,logoCy,logoR,0,2*Math.PI);ctx.clip();
        ctx.drawImage(logoImg,logoCx-logoR,logoCy-logoR,logoR*2,logoR*2);
        ctx.restore();
        ctx.strokeStyle=gold;ctx.globalAlpha=0.7;ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(logoCx,logoCy,logoR+3,0,2*Math.PI);ctx.stroke();
        ctx.globalAlpha=1;
        onDone();
      };
      logoImg.onerror=()=>onDone(); // non-critical decoration; don't fail the whole card over it
      logoImg.src=ID_CARD_LOGO;
    }
    function finish(){
      canvas.toBlob(blob=>{
        if(blob)resolve(blob);else reject(new Error('toBlob returned null'));
      },'image/png');
    }
    drawStaticPart();
    drawLogo(()=>drawPhotoOrInitials());
  });
}


function openOfficerForm(office){
  const current=DATA.members.find(m=>m.role===office);
  const activeMembers=DATA.members.filter(isActiveMember);
  openModal(`
    <h3>Edit ${escHtml(office)}</h3>
    <form id="officer-form">
      <div class="field"><label>Assign from existing members</label>
        <select id="o-existing">
          <option value="">&mdash; choose a member &mdash;</option>
          ${activeMembers.map(m=>`<option value="${m.id}" ${current&&current.id===m.id?'selected':''}>${escHtml(m.name)}</option>`).join('')}
        </select>
      </div>
      <p class="cell-muted" style="margin:6px 0;">Or type a name directly (for officers not yet on the member roster):</p>
      <div class="field"><label>Officer name</label><input type="text" id="o-name" value="${current?escHtml(current.name):''}" placeholder="Full name"/></div>
      ${current?'<p class="cell-muted">Saving will rename '+escHtml(current.name)+'. To remove them from this office without renaming, choose a different member above or clear the name field and pick \u2014 then assign someone else.</p>':''}
      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  `);
  document.getElementById('o-existing').addEventListener('change',e=>{
    const sel=DATA.members.find(m=>m.id===e.target.value);
    if(sel)document.getElementById('o-name').value=sel.name;
  });
  document.getElementById('officer-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const existingId=document.getElementById('o-existing').value;
    const typedName=document.getElementById('o-name').value.trim();
    if(!typedName&&!existingId){showToast('Enter a name or choose a member');return;}
    const pin=getCurrentAuthPin();
    const submitBtn=e.target.querySelector('button[type=submit]');
    submitBtn.disabled=true;submitBtn.textContent='Saving\u2026';
    try{
      const newHolderId=existingId||(current?current.id:null);
      // Clear this office from anyone currently holding it, except the
      // person who's about to hold it again (avoids a pointless extra write).
      const previousHolders=DATA.members.filter(m=>m.role===office&&m.id!==newHolderId);
      for(const prev of previousHolders){
        const{error}=await sb.rpc('officer_upsert_member',{
          p_officer_pin:pin,p_id:prev.id,p_name:prev.name,p_role:'Member',p_status:prev.status,
          p_phone:prev.phone,p_email:prev.email,p_joined:prev.joined||null,p_photo:null,p_pin:prev.pin
        });
        if(error)throw error;
      }
      if(existingId){
        const sel=DATA.members.find(m=>m.id===existingId);
        if(sel){
          const{error}=await sb.rpc('officer_upsert_member',{
            p_officer_pin:pin,p_id:sel.id,p_name:typedName||sel.name,p_role:office,p_status:sel.status,
            p_phone:sel.phone,p_email:sel.email,p_joined:sel.joined||null,p_photo:null,p_pin:sel.pin
          });
          if(error)throw error;
        }
      }else if(current){
        const{error}=await sb.rpc('officer_upsert_member',{
          p_officer_pin:pin,p_id:current.id,p_name:typedName,p_role:office,p_status:current.status,
          p_phone:current.phone,p_email:current.email,p_joined:current.joined||null,p_photo:null,p_pin:current.pin
        });
        if(error)throw error;
      }else{
        const newId=uid();
        const{error}=await sb.rpc('officer_upsert_member',{
          p_officer_pin:pin,p_id:newId,p_name:typedName,p_role:office,p_status:'active',
          p_phone:'',p_email:'',p_joined:new Date().toISOString().slice(0,10),p_photo:null,p_pin:genUniquePin()
        });
        if(error)throw error;
      }
      closeModal();showToast('Officer updated');
    }catch(err){
      submitBtn.disabled=false;submitBtn.textContent='Save';
      showToast('Could not save: '+(err.message||'unknown error'));
    }
  });
}

/* ============ PIN GATE ============ */
const EDITOR_PINS={
  secretary:'4821',
  treasurer:'7395',
  financial_secretary:'1064'
};
const SESSION_KEY='oasis-club-session-v1';

function getCurrentAuthPin(){
  const value=sessionStorage.getItem(SESSION_KEY)||'';
  if(value.startsWith('role:')){
    return EDITOR_PINS[value.slice(5)]||null;
  }
  if(value.startsWith('member:')){
    const mem=DATA.members.find(m=>m.id===value.slice(7));
    return mem?mem.pin:null;
  }
  return null;
}
function isOfficerSessionNow(){
  return (sessionStorage.getItem(SESSION_KEY)||'').startsWith('role:');
}
function isTreasurerSessionNow(){
  return sessionStorage.getItem(SESSION_KEY)==='role:treasurer';
}
function isFinancialSecretarySessionNow(){
  return sessionStorage.getItem(SESSION_KEY)==='role:financial_secretary';
}
function canApprovePayments(){return isTreasurerSessionNow();}
function canRejectPayments(){return isTreasurerSessionNow()||isFinancialSecretarySessionNow();}
function canManageConstitution(){
  // Restricted to the three named officer logins only (secretary,
  // treasurer, financial secretary) -- a member's own role/office,
  // even President, no longer grants this on its own.
  return isOfficerSessionNow();
}

/* ============ NEWS & NOTICES ============ */
const NEWS_REVIEWER_ROLES=['President','PRO'];
function isNewsReviewerNow(){
  const memberId=getCurrentMemberId();
  if(!memberId)return false;
  const mem=DATA.members.find(m=>m.id===memberId);
  return mem?NEWS_REVIEWER_ROLES.includes(mem.role):false;
}
// Posts a session is allowed to see: everyone sees approved posts;
// a member also sees their own pending/rejected posts; President/PRO
// see every pending post too, so they have something to review.
// (As elsewhere in this app, this is a UI-level visibility rule, not
// a database-level one -- the same trust model already used for PINs.)
function visibleNewsPosts(){
  const memberId=getCurrentMemberId();
  const reviewer=isNewsReviewerNow();
  return DATA.newsPosts.filter(p=>{
    if(p.status==='approved')return true;
    if(reviewer)return true;
    if(memberId&&p.authorId===memberId)return true;
    return false;
  });
}
function pendingNewsCountForReviewer(){
  if(!isNewsReviewerNow())return 0;
  return DATA.newsPosts.filter(p=>p.status==='pending').length;
}
// Pending payment evidence is visible only to its submitter, the
// Treasurer, and the Financial Secretary (UI-level rule, same trust
// model as PINs and pending News posts elsewhere in this app).
function visiblePaymentSubmissions(){
  const memberId=getCurrentMemberId();
  const canReview=isTreasurerSessionNow()||isFinancialSecretarySessionNow();
  return DATA.paymentSubmissions.filter(p=>{
    if(p.status!=='pending')return true; // approved/rejected: visible to the submitter on their own profile, handled by caller filtering on memberId
    if(canReview)return true;
    if(memberId&&p.memberId===memberId)return true;
    return false;
  });
}
function pendingPaymentCountForReviewer(){
  if(!isTreasurerSessionNow()&&!isFinancialSecretarySessionNow())return 0;
  return DATA.paymentSubmissions.filter(p=>p.status==='pending').length;
}
// Small allowlist HTML sanitizer for rich-text post bodies. Strips
// anything that isn't a basic formatting tag, and strips every
// attribute except a safe "style" with only color/font-weight/etc,
// so a post can't carry scripts, event handlers, or javascript: links.
const NEWS_ALLOWED_TAGS=new Set(['B','STRONG','I','EM','U','S','STRIKE','BR','P','DIV','SPAN','UL','OL','LI','H3','H4','A']);
function sanitizeNewsHtml(html){
  const tmp=document.createElement('div');
  tmp.innerHTML=html;
  (function clean(node){
    [...node.childNodes].forEach(child=>{
      if(child.nodeType===Node.ELEMENT_NODE){
        if(!NEWS_ALLOWED_TAGS.has(child.tagName)){
          // Unwrap disallowed elements (keep their text/children, drop the tag itself)
          while(child.firstChild)node.insertBefore(child.firstChild,child);
          node.removeChild(child);
          return;
        }
        [...child.attributes].forEach(attr=>{
          const name=attr.name.toLowerCase();
          if(name==='style'){
            // Only allow a safe subset of inline style properties
            const safe=attr.value.split(';').filter(rule=>{
              const prop=rule.split(':')[0].trim().toLowerCase();
              return['color','background-color','font-weight','font-style','text-decoration'].includes(prop);
            }).join(';');
            if(safe)child.setAttribute('style',safe);else child.removeAttribute('style');
          }else if(name==='href'&&child.tagName==='A'){
            if(!/^https?:\/\//i.test(attr.value))child.removeAttribute('href');
            else{child.setAttribute('target','_blank');child.setAttribute('rel','noopener noreferrer');}
          }else{
            child.removeAttribute(attr.name);
          }
        });
        clean(child);
      }else if(child.nodeType!==Node.TEXT_NODE){
        node.removeChild(child); // comments, etc.
      }
    });
  })(tmp);
  return tmp.innerHTML;
}

  const memberGroup=document.createElement('optgroup');
  memberGroup.label='Members';
  DATA.members.filter(m=>m.status!=='dismissed').forEach(m=>{
    const opt=document.createElement('option');
    opt.value='member:'+m.id;
    const blocked=m.status==='suspended';
    opt.textContent=m.name+(blocked?' (suspended)':'');
    memberGroup.appendChild(opt);
  });
  sel.appendChild(memberGroup);
  if(prev)sel.value=prev;
}

function checkPin(){
  const value=document.getElementById('pin-role').value;
  const pin=document.getElementById('pin-input').value.trim();
  const errEl=document.getElementById('pin-error');
  if(!value){errEl.textContent='Please select your name first';return;}
  if(!pin){errEl.textContent='Enter your PIN';return;}

  if(value.startsWith('role:')){
    const role=value.slice(5);
    if(EDITOR_PINS[role]===pin){
      sessionStorage.setItem(SESSION_KEY,value);
      document.getElementById('pin-gate').classList.remove('show');
      errEl.textContent='';
      updateNavForSession();
      showToast('Welcome, '+role.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase()));
    }else{
      errEl.textContent='Incorrect PIN. Please try again.';
      document.getElementById('pin-input').value='';document.getElementById('pin-input').focus();
    }
    return;
  }

  const memberId=value.slice(7);
  const member=DATA.members.find(m=>m.id===memberId);
  if(!member){errEl.textContent='Member not found.';return;}
  if(member.status==='suspended'||member.status==='dismissed'){
    errEl.textContent='Access has been suspended for this member. Contact a club officer.';
    return;
  }
  if(member.pin===pin){
    sessionStorage.setItem(SESSION_KEY,value);
    document.getElementById('pin-gate').classList.remove('show');
    errEl.textContent='';
    updateNavForSession();
    showToast('Welcome, '+member.name);
  }else{
    errEl.textContent='Incorrect PIN. Please try again.';
    document.getElementById('pin-input').value='';document.getElementById('pin-input').focus();
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  const pinInput=document.getElementById('pin-input');
  if(pinInput)pinInput.addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});
});
function checkSession(){
  const value=sessionStorage.getItem(SESSION_KEY);
  if(!value)return null;
  if(value.startsWith('role:')){
    const role=value.slice(5);
    return EDITOR_PINS[role]?value:null;
  }
  const memberId=value.slice(7);
  const member=DATA.members.find(m=>m.id===memberId);
  if(!member)return null;
  if(member.status==='suspended'||member.status==='dismissed')return null; // access auto-revoked
  return value;
}
function getCurrentMemberId(){
  const value=sessionStorage.getItem(SESSION_KEY)||'';
  return value.startsWith('member:')?value.slice(7):null;
}
function updateNavForSession(){
  const navProfile=document.getElementById('nav-profile');
  if(navProfile)navProfile.style.display=getCurrentMemberId()?'':'none';
  const navPaymentReview=document.getElementById('nav-payment-review');
  if(navPaymentReview)navPaymentReview.style.display=(isTreasurerSessionNow()||isFinancialSecretarySessionNow())?'':'none';
  const navCommittees=document.getElementById('nav-committees');
  if(navCommittees)navCommittees.style.display=isOfficerSessionNow()?'':'none';
}
function lockApp(){
  sessionStorage.removeItem(SESSION_KEY);
  populatePinSelect();
  updateNavForSession();
  document.getElementById('pin-gate').classList.add('show');
  document.getElementById('pin-input').value='';
  document.getElementById('pin-role').value='';
}

/* ============ RENDER ============ */
function render(){
  const main=document.getElementById('main');
  if(currentPage==='overview')main.innerHTML=pageOverview();
  else if(currentPage==='profile'){main.innerHTML=pageProfile();setupProfilePage();}
  else if(currentPage==='members')main.innerHTML=pageMembers();
  else if(currentPage==='photos')main.innerHTML=pagePhotos();
  else if(currentPage==='dues')main.innerHTML=pageDues();
  else if(currentPage==='minutes')main.innerHTML=pageMinutes();
  else if(currentPage==='finance')main.innerHTML=pageFinance();
  else if(currentPage==='committee')main.innerHTML=pageCommittee();
  else if(currentPage==='constitution'){main.innerHTML=pageConstitution();setupConstitutionPage();}
  else if(currentPage==='news'){main.innerHTML=pageNews();setupNewsPage();}
  else if(currentPage==='tasks'){main.innerHTML=pageTasks();setupTasksPage();}
  else if(currentPage==='payment-review')main.innerHTML=pagePaymentReview();
  else if(currentPage==='committees')main.innerHTML=pageCommittees();
  updateNewsBadge();
  updatePaymentBadge();
}

/* ============ APP UPDATE HANDLING ============ */
let pendingWorker=null;

function showUpdateBanner(){
  document.getElementById('update-banner').classList.add('show');
}
function dismissUpdateBanner(){
  document.getElementById('update-banner').classList.remove('show');
}
function confirmAppUpdate(){
  const btn=document.getElementById('update-confirm-btn');
  btn.textContent='Updating…';
  btn.disabled=true;
  if(pendingWorker){
    // Tell the waiting service worker to take over immediately, then reload once it has.
    pendingWorker.postMessage({type:'SKIP_WAITING'});
    pendingWorker=null;
  }else{
    // No service worker waiting (e.g. first load, or SW unsupported) — a hard reload
    // bypassing the cache is the safest fallback to pick up the latest file.
    window.location.reload();
  }
}

function setupServiceWorker(){
  if(!('serviceWorker' in window.navigator)||!window.isSecureContext)return;

  navigator.serviceWorker.register('./service-worker.js').then(reg=>{
    // Case 1: an update was already found and is waiting before this page even loaded.
    if(reg.waiting){
      pendingWorker=reg.waiting;
      showUpdateBanner();
    }
    // Case 2: a new service worker starts installing while this tab is open.
    reg.addEventListener('updatefound',()=>{
      const newWorker=reg.installing;
      if(!newWorker)return;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed'&&reg.active){
          pendingWorker=newWorker;
          showUpdateBanner();
        }
      });
    });
    // Periodically ask the browser to re-check for a newer service-worker.js on the server.
    setInterval(()=>{reg.update().catch(()=>{});},60*1000);
  }).catch(()=>{/* service worker registration failed; app still works without offline support */});

  // Once the new worker takes control, reload so the page itself loads fresh from cache v-next.
  let refreshed=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshed)return;
    refreshed=true;
    window.location.reload();
  });
}

(async function init(){
  await loadData();
  populatePinSelect();
  setupServiceWorker();
  updateNavForSession();
  document.getElementById('load-overlay').style.display='none';
  document.getElementById('shell').style.display='grid';
  if(!checkSession()){
    document.getElementById('pin-gate').classList.add('show');
  }
  render();
})();
</script>
